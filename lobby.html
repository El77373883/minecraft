<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AdrianCraft - Lobby</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background:#1a1a2e;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.08)}
.header-left{display:flex;align-items:center;gap:10px}
.skin-preview{width:44px;height:44px;background:linear-gradient(135deg,#5a8f3c,#3d6b24);border-radius:8px;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.skin-preview svg{width:30px;height:30px}
.player-info{display:flex;flex-direction:column}
.player-name{color:#fff;font-size:15px;font-weight:700}
.player-level{color:rgba(255,255,255,0.5);font-size:11px}
.header-right{display:flex;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.icon-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.15)}
.icon-btn svg{width:20px;height:20px;fill:rgba(255,255,255,0.7)}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
.game-title{font-size:36px;font-weight:900;color:#fff;text-align:center;letter-spacing:3px;margin-bottom:4px;text-shadow:0 0 20px rgba(90,143,60,0.5)}
.game-subtitle{color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:4px;margin-bottom:30px}
.menu-btn{width:100%;max-width:300px;height:52px;border-radius:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;font-size:16px;font-weight:700;letter-spacing:1px;transition:all 0.2s;position:relative;overflow:hidden}
.menu-btn:active{transform:scale(0.96)}
.menu-btn.primary{background:linear-gradient(135deg,#5a8f3c,#4a7a2e);color:#fff;box-shadow:0 4px 20px rgba(90,143,60,0.4)}
.menu-btn.primary:active{box-shadow:0 2px 10px rgba(90,143,60,0.3)}
.menu-btn.secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.12)}
.menu-btn svg{width:22px;height:22px;fill:currentColor}
.btn-play{background:linear-gradient(135deg,#5a8f3c,#4a7a2e);color:#fff;box-shadow:0 4px 20px rgba(90,143,60,0.4),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn-multi{background:linear-gradient(135deg,#2a5298,#1e3c72);color:#fff;box-shadow:0 4px 20px rgba(42,82,152,0.4),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn-edit{background:linear-gradient(135deg,#8B4513,#6b3410);color:#fff;box-shadow:0 4px 20px rgba(139,69,19,0.4),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn-settings{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.12)}
.btn-credits{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.12)}
.bg-scene{position:absolute;bottom:0;left:0;right:0;height:200px;pointer-events:none;overflow:hidden}
.bg-block{position:absolute;bottom:0;width:40px;background:linear-gradient(180deg,#5a8f3c 0%,#5a8f3c 30%,#8B6914 30%,#6B4226 100%);border:1px solid rgba(0,0,0,0.2)}
.bg-tree{position:absolute;bottom:60px}
.bg-tree::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:12px;height:40px;background:#6B4226;border-radius:2px}
.bg-tree::after{content:'';position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:40px;height:40px;background:#3d6b24;border-radius:50%}
.footer{padding:16px;text-align:center;color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:2px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modal-content{background:#1e1e3a;border-radius:20px;padding:28px;max-width:320px;width:100%;border:1px solid rgba(255,255,255,0.1)}
.modal-title{color:#fff;font-size:20px;font-weight:800;margin-bottom:16px;text-align:center}
.modal-close{width:100%;height:44px;border-radius:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:14px;font-weight:600;cursor:pointer;margin-top:16px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.setting-label{color:rgba(255,255,255,0.7);font-size:14px}
.toggle{width:48px;height:26px;background:rgba(255,255,255,0.15);border-radius:13px;position:relative;cursor:pointer;transition:0.3s}
.toggle.on{background:#5a8f3c}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:0.3s}
.toggle.on::after{left:25px}
</style>
</head>
<body>

<div class="header">
<div class="header-left">
<div class="skin-preview">
<svg viewBox="0 0 30 30">
<rect x="8" y="2" width="14" height="14" rx="2" fill="#d4a574"/>

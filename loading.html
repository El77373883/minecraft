<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AdrianCraft - Iniciando</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif}
#loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000}
.scene{position:relative;width:100px;height:100px;margin-bottom:40px}
.cube{width:120px;height:120px;position:relative;transform-style:preserve-3d;transform:rotateX(-20deg) rotateY(0deg);animation:spin 10s infinite linear}
@keyframes spin{0%{transform:rotateX(-20deg) rotateY(0deg)}100%{transform:rotateX(-20deg) rotateY(360deg)}}
.face{position:absolute;width:120px;height:120px;backface-visibility:hidden;border:2px solid rgba(255,255,255,0.15)}
.f1{background:linear-gradient(135deg,#5a8f3c 0%,#4a7a2e 100%);transform:translateZ(60px)}
.f2{background:linear-gradient(135deg,#8B6914 0%,#6B4226 100%);transform:rotateY(180deg) translateZ(60px)}
.f3{background:linear-gradient(135deg,#6B4226 0%,#5c3820 100%);transform:rotateY(90deg) translateZ(60px)}
.f4{background:linear-gradient(135deg,#6B4226 0%,#5c3820 100%);transform:rotateY(-90deg) translateZ(60px)}
.f5{background:linear-gradient(135deg,#5a8f3c 0%,#4a7a2e 100%);transform:rotateX(90deg) translateZ(60px)}
.f6{background:linear-gradient(135deg,#8B6914 0%,#6B4226 100%);transform:rotateX(-90deg) translateZ(60px)}
.title{font-size:48px;font-weight:900;letter-spacing:6px;color:transparent;background:linear-gradient(90deg,#5a8f3c,#8bc34a,#5a8f3c);-webkit-background-clip:text;background-clip:text;background-size:200% 100%;animation:titleGlow 3s infinite}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(90,143,60,0.8))}50%{filter:drop-shadow(0 0 40px rgba(90,143,60,1))}}
#loader.exit{animation:fadeOutMove 1.2s forwards}
@keyframes fadeOutMove{to{opacity:0;transform:translateY(-50px)}from{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="loader">
<div class="scene">
<div class="cube">
<div class="face f1"></div>
<div class="face f2"></div>
<div class="face f3"></div>
<div class="face f4"></div>
<div class="face f5"></div>
<div class="face f6"></div>
</div>
</div>
<div class="title">ADRIANCRAFT</div>
</div>
<script>
setTimeout(()=>{
document.getElementById('loader').classList.add('exit');
setTimeout(()=>{
location.href='lobby.html';
},1200);
},3500);
</script>
</body>
</html>

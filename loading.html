<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AdrianCraft - Iniciando</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#08080f;font-family:system-ui,-apple-system,sans-serif}
#loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#141420 0%,#08080f 100%)}
.cube-scene{perspective:700px;width:120px;height:120px;margin-bottom:50px}
.cube{width:120px;height:120px;position:relative;transform-style:preserve-3d;animation:rotate 6s infinite linear}
@keyframes rotate{0%{transform:rotateX(-15deg) rotateY(0deg)}100%{transform:rotateX(-15deg) rotateY(360deg)}}
.face{position:absolute;width:120px;height:120px;border:2px solid rgba(255,255,255,0.1);backface-visibility:hidden}
.f1{background:linear-gradient(135deg,#5a8f3c 0%,#4a7a2e 100%);transform:translateZ(60px)}
.f2{background:linear-gradient(135deg,#8B6914 0%,#6B4226 100%);transform:rotateY(180deg) translateZ(60px)}
.f3{background:linear-gradient(135deg,#6B4226 0%,#5c3820 100%);transform:rotateY(90deg) translateZ(60px)}
.f4{background:linear-gradient(135deg,#6B4226 0%,#5c3820 100%);transform:rotateY(-90deg) translateZ(60px)}
.f5{background:linear-gradient(135deg,#5a8f3c 0%,#4a7a2e 100%);transform:rotateX(90deg) translateZ(60px)}
.f6{background:linear-gradient(135deg,#8B6914 0%,#6B4226 100%);transform:rotateX(-90deg) translateZ(60px)}
.title{font-size:42px;font-weight:900;color:#fff;letter-spacing:4px;text-shadow:0 0 30px rgba(90,143,60,0.8),0 0 50px rgba(90,143,60,0.4);margin-bottom:8px}
.glow{position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(90,143,60,0.15) 0%,transparent 70%);border-radius:50%;animation:pulse 4s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.3);opacity:0.7}}
</style>
</head>
<body>
<div id="loader">
<div class="glow"></div>
<div class="cube-scene">
<div class="cube">
<div class="face f1"></div>
<div class="face f2"></div>
<div class="face f3"></div>
<div class="face f4"></div>
<div class="face f5"></div>
<div class="face f6"></div>
</div>
</div>
<div class="title">ADRIANCRAFT</div>
</div>
<script>
// Esperar 3 segundos y luego avanzar
setTimeout(()=>{
location.href='lobby.html';
},3000);
</script>
</body>
</html>

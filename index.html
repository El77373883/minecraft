<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AdrianCraft - Juego</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
canvas{display:block;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#coords{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#fff;font-size:11px;padding:6px 10px;border-radius:8px;font-family:monospace;letter-spacing:0.5px}
#timeDisplay{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);color:#fff;font-size:11px;padding:6px 10px;border-radius:8px;display:flex;align-items:center;gap:6px}
#timeIcon{width:16px;height:16px}
#inventoryBar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:6px;border-radius:12px;border:1px solid rgba(255,255,255,0.1)}
.inv-slot{width:44px;height:44px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;position:relative;transition:all 0.15s}
.inv-slot.selected{border-color:#5a8f3c;background:rgba(90,143,60,0.25);box-shadow:0 0 12px rgba(90,143,60,0.3)}
.inv-slot:active{transform:scale(0.9)}
.inv-slot canvas{width:32px;height:32px;image-rendering:pixelated}
.inv-count{position:absolute;bottom:1px;right:3px;color:#fff;font-size:9px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.8)}
#controls{position:absolute;bottom:80px;pointer-events:auto}
#dpad{position:absolute;bottom:80px;left:16px;width:130px;height:130px}
.dpad-btn{position:absolute;width:44px;height:44px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.1s}
.dpad-btn:active{background:rgba(255,255,255,0.25);transform:scale(0.9)}
.dpad-btn svg{width:20px;height:20px;fill:rgba(255,255,255,0.8)}
.dpad-up{left:43px;top:0}
.dpad-down{left:43px;bottom:0}
.dpad-left{left:0;top:43px}
.dpad-right{right:0;top:43px}
#actionBtns{position:absolute;bottom:80px;right:16px;display:flex;gap:10px;pointer-events:auto}
.action-btn{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.1s;border:2px solid rgba(255,255,255,0.15)}
.action-btn:active{transform:scale(0.9)}
.action-btn svg{width:24px;height:24px;fill:rgba(255,255,255,0.85)}
#breakBtn{background:rgba(220,50,50,0.3)}
#placeBtn{background:rgba(50,180,50,0.3)}
#jumpBtn{background:rgba(50,100,220,0.3)}
#backBtn{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);color:#fff;border:1px solid rgba(255,255,255,0.1);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;pointer-events:auto;display:flex;align-items:center;gap:6px}
#backBtn svg{width:14px;height:14px;fill:currentColor}
#modeIndicator{position:absolute;top:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.6);padding:4px 10px;border-radius:6px;font-size:10px;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
<div id="coords">X: 0 Y: 0</div>
<div id="timeDisplay"><div id="timeIcon"></div><span id="timeText">Dia</span></div>
<div id="modeIndicator">MODO: CONSTRUIR</div>
<button id="backBtn" onclick="window.location.href='lobby.html'">
<svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
Lobby
</button>
<div id="controls">
<div id="dpad">
<div class="dpad-btn dpad-up" id="btnUp"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></div>
<div class="dpad-btn dpad-down" id="btnDown"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></div>
<div class="dpad-btn dpad-left" id="btnLeft"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg></div>
<div class="dpad-btn dpad-right" id="btnRight"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
</div>
</div>
<div id="actionBtns">
<div class="action-btn" id="breakBtn"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>
<div class="action-btn" id="placeBtn"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
<div class="action-btn" id="jumpBtn"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></div>
</div>
<div id="inventoryBar"></div>
</div>

<script>
// ==================== CONFIG ====================
const BLOCK_SIZE = 32;
const WORLD_W = 300;
const WORLD_H = 120;
const GRAVITY = 0.45;
const JUMP_FORCE = -8.5;
const MOVE_SPEED = 3.2;
const PLAYER_W = 20;
const PLAYER_H = 28;

// ==================== BLOCK TYPES ====================
const BLOCKS = {
  0: { name: 'Aire', solid: false },
  1: { name: 'Pasto', color: '#5a8f3c', top: '#6abf4a', bottom: '#8B6914', solid: true },
  2: { name: 'Tierra', color: '#8B6914', solid: true },
  3: { name: 'Piedra', color: '#808080', solid: true },
  4: { name: 'Madera', color: '#6B4226', solid: true },
  5: { name: 'Hojas', color: '#3d6b24', solid: true },
  6: { name: 'Agua', color: '#3d7ab5', solid: false, transparent: true },
  7: { name: 'Arena', color: '#e8d68e', solid: true },
  8: { name: 'Tablon', color: '#c49a5a', solid: true },
  9: { name: 'Piedra Ladrillo', color: '#a0522d', solid: true },
  10: { name: 'Vidrio', color: '#add8e6', solid: true, transparent: true },
  11: { name: 'Lana Blanca', color: '#f0f0f0', solid: true },
  12: { name: 'Lana Roja', color: '#cc3333', solid: true },
  13: { name: 'Lana Azul', color: '#3366cc', solid: true },
  14: { name: 'Lana Verde', color: '#33aa33', solid: true },
  15: { name: 'Carbon', color: '#3a3a3a', solid: true },
  16: { name: 'Hierro', color: '#c4a882', solid: true },
  17: { name: 'Oro', color: '#ffd700', solid: true },
  18: { name: 'Diamante', color: '#00e5ff', solid: true },
  19: { name: 'Adoquin', color: '#6b6b6b', solid: true },
  20: { name: 'Mesa', color: '#8B5E3C', solid: true },
  21: { name: 'Horno', color: '#555555', solid: true },
  22: { name: 'Cama', color: '#cc2222', solid: true },
};

// ==================== TEXTURE CACHE ====================
const textureCache = {};
function getTexture(id) {
  if (textureCache[id]) return textureCache[id];
  const c = document.createElement('canvas');
  c.width = BLOCK_SIZE; c.height = BLOCK_SIZE;
  const ctx = c.getContext('2d');
  drawBlockTexture(ctx, id);
  textureCache[id] = c;
  return c;
}

function drawBlockTexture(ctx, id) {
  const b = BLOCKS[id];
  if (!b || id === 0) return;
  ctx.fillStyle = b.color;
  ctx.fillRect(0, 0, BLOCK_SIZE, BLOCK_SIZE);

  // Add pixel detail
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
    ctx.fillRect(Math.random() * BLOCK_SIZE | 0, Math.random() * BLOCK_SIZE | 0, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Block border
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, BLOCK_SIZE - 1, BLOCK_SIZE - 1);

  if (b.top) {
    ctx.fillStyle = b.top;
    ctx.fillRect(0, 0, BLOCK_SIZE, 4);
    ctx.fillStyle = b.bottom;
    ctx.fillRect(0, BLOCK_SIZE - 4, BLOCK_SIZE, 4);
  }

  // Special textures
  if (id === 4) { // Wood grain
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    for (let y = 0; y < BLOCK_SIZE; y += 6) {
      ctx.beginPath(); ctx.moveTo(0, y + Math.random() * 2); ctx.lineTo(BLOCK_SIZE, y + Math.random() * 2); ctx.stroke();
    }
  }
  if (id === 5) { // Leaves
    ctx.fillStyle = '#2d5a14';
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(Math.random() * 28, Math.random() * 28, 4, 4);
    }
  }
  if (id === 15) { // Coal
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(6, 6, 8, 6); ctx.fillRect(18, 16, 8, 6); ctx.fillRect(8, 22, 6, 5);
  }
  if (id === 16) { // Iron
    ctx.fillStyle = '#e8d8c0';
    ctx.fillRect(4, 8, 7, 5); ctx.fillRect(16, 4, 8, 5); ctx.fillRect(10, 18, 7, 5);
  }
  if (id === 17) { // Gold
    ctx.fillStyle = '#fff8b0';
    ctx.fillRect(5, 5, 7, 6); ctx.fillRect(18, 14, 7, 6); ctx.fillRect(10, 22, 6, 5);
  }
  if (id === 18) { // Diamond
    ctx.fillStyle = '#80ffff';
    ctx.fillRect(6, 6, 6, 5); ctx.fillRect(18, 12, 6, 5); ctx.fillRect(10, 20, 6, 5);
    ctx.fillStyle = '#fff';
    ctx.fillRect(8, 7, 2, 2); ctx.fillRect(20, 13, 2, 2);
  }
  if (id === 8) { // Planks
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    for (let y = 0; y < BLOCK_SIZE; y += 8) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(BLOCK_SIZE, y); ctx.stroke();
    }
  }
  if (id === 10) { // Glass
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(2, 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(BLOCK_SIZE, BLOCK_SIZE); ctx.stroke();
  }
  if (id === 20) { // Crafting table
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(0, 0, BLOCK_SIZE, BLOCK_SIZE);
    ctx.fillStyle = '#a0784a';
    ctx.fillRect(2, 2, 13, 13); ctx.fillRect(17, 2, 13, 13);
    ctx.fillRect(2, 17, 13, 13); ctx.fillRect(17, 17, 13, 13);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.strokeRect(2, 2, 13, 13); ctx.strokeRect(17, 2, 13, 13);
    ctx.strokeRect(2, 17, 13, 13); ctx.strokeRect(17, 17, 13, 13);
  }
  if (id === 21) { // Furnace
    ctx.fillStyle = '#444';
    ctx.fillRect(6, 6, 20, 20);
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(10, 14, 12, 10);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(12, 16, 8, 6);
  }
}

// ==================== WORLD GENERATION ====================
let world = [];
let surfaceY = [];

function noise(x, seed) {
  const n = Math.sin(x * 12.9898 + seed * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, seed) {
  const ix = Math.floor(x);
  const fx = x - ix;
  const t = fx * fx * (3 - 2 * fx);
  return noise(ix, seed) * (1 - t) + noise(ix + 1, seed) * t;
}

function terrainHeight(x) {
  const base = 50;
  const h1 = smoothNoise(x * 0.02, 42) * 20;
  const h2 = smoothNoise(x * 0.05, 137) * 8;
  const h3 = smoothNoise(x * 0.1, 256) * 4;
  return Math.floor(base + h1 + h2 + h3);
}

function generateWorld() {
  world = [];
  surfaceY = [];
  for (let x = 0; x < WORLD_W; x++) {
    world[x] = [];
    const sy = terrainHeight(x);
    surfaceY[x] = sy;
    for (let y = 0; y < WORLD_H; y++) {
      if (y < sy) {
        world[x][y] = 0;
      } else if (y === sy) {
        world[x][y] = 1;
      } else if (y < sy + 4) {
        world[x][y] = 2;
      } else if (y < sy + 20) {
        world[x][y] = Math.random() < 0.03 ? 15 : 3;
        if (y > sy + 12 && Math.random() < 0.02) world[x][y] = 16;
        if (y > sy + 16 && Math.random() < 0.01) world[x][y] = 17;
        if (y > sy + 18 && Math.random() < 0.005) world[x][y] = 18;
      } else {
        world[x][y] = 3;
      }
    }
  }

  // Water in low areas
  const waterLevel = 52;
  for (let x = 0; x < WORLD_W; x++) {
    if (surfaceY[x] > waterLevel) {
      for (let y = waterLevel; y <= surfaceY[x]; y++) {
        if (world[x][y] === 0) world[x][y] = 6;
      }
      if (world[x][surfaceY[x]] === 1) world[x][surfaceY[x]] = 7;
    }
  }

  // Rivers
  for (let x = 0; x < WORLD_W; x++) {
    const riverNoise = smoothNoise(x * 0.03, 999);
    if (riverNoise > 0.6 && riverNoise < 0.7) {
      const riverY = waterLevel;
      for (let dy = -2; dy <= 2; dy++) {
        const ry = riverY + dy;
        if (ry >= 0 && ry < WORLD_H && x < WORLD_W) {
          world[x][ry] = 6;
          if (ry === riverY + 2 && surfaceY[x] <= riverY) world[x][ry] = 7;
        }
      }
    }
  }

  // Trees
  for (let x = 5; x < WORLD_W - 5; x++) {
    const treeNoise = noise(x, 777);
    if (treeNoise > 0.85 && world[x][surfaceY[x]] === 1) {
      const treeH = 5 + Math.floor(noise(x, 888) * 3);
      const baseY = surfaceY[x];
      // Trunk
      for (let ty = 1; ty <= treeH; ty++) {
        if (baseY - ty >= 0) world[x][baseY - ty] = 4;
      }
      // Leaves
      for (let lx = -2; lx <= 2; lx++) {
        for (let ly = -3; ly <= -1; ly++) {
          const wx = x + lx;
          const wy = baseY - treeH + ly;
          if (wx >= 0 && wx < WORLD_W && wy >= 0 && wy < WORLD_H) {
            if (world[wx][wy] === 0 && Math.abs(lx) + Math.abs(ly + 2) < 4) {
              world[wx][wy] = 5;
            }
          }
        }
      }
      x += 4;
    }
  }

  // Villages
  const villagePositions = [];
  for (let x = 20; x < WORLD_W - 30; x += 15 + Math.floor(noise(x, 555) * 10)) {
    if (Math.abs(surfaceY[x] - 50) < 5) {
      villagePositions.push(x);
      // House
      const hw = 6 + Math.floor(noise(x, 666) * 3);
      const hh = 4;
      const baseY = surfaceY[x];
      for (let dx = 0; dx < hw; dx++) {
        for (let dy = 0; dy < hh; dy++) {
          const wx = x + dx;
          const wy = baseY - dy;
          if (wx >= 0 && wx < WORLD_W && wy >= 0) {
            if (dy === hh - 1 || dx === 0 || dx === hw - 1) {
              world[wx][wy] = 8;
            } else {
              world[wx][wy] = 0;
            }
          }
        }
      }
      // Roof
      for (let dx = -1; dx <= hw; dx++) {
        const wx = x + dx;
        const wy = baseY - hh;
        if (wx >= 0 && wx < WORLD_W && wy >= 0) world[wx][wy] = 9;
      }
      // Door
      const doorX = x + Math.floor(hw / 2);
      if (doorX < WORLD_W) world[doorX][baseY] = 0;

      x += hw + 5;
    }
  }
}

// ==================== ENTITIES ====================
let entities = [];

function spawnEntities() {
  entities = [];
  // Cows
  for (let i = 0; i < 15; i++) {
    const x = 10 + Math.floor(Math.random() * (WORLD_W - 20));
    entities.push({ type: 'cow', x: x * BLOCK_SIZE, y: (surfaceY[x] - 1) * BLOCK_SIZE, w: 24, h: 18, vx: 0, vy: 0, dir: Math.random() > 0.5 ? 1 : -1, timer: 0, alive: true });
  }
  // Sheep
  for (let i = 0; i < 12; i++) {
    const x = 10 + Math.floor(Math.random() * (WORLD_W - 20));
    entities.push({ type: 'sheep', x: x * BLOCK_SIZE, y: (surfaceY[x] - 1) * BLOCK_SIZE, w: 20, h: 16, vx: 0, vy: 0, dir: Math.random() > 0.5 ? 1 : -1, timer: 0, alive: true, wool: ['#f0f0f0', '#cc3333', '#3366cc', '#33aa33'][Math.floor(Math.random() * 4)] });
  }
  // Wolves
  for (let i = 0; i < 6; i++) {
    const x = 10 + Math.floor(Math.random() * (WORLD_W - 20));
    entities.push({ type: 'wolf', x: x * BLOCK_SIZE, y: (surfaceY[x] - 1) * BLOCK_SIZE, w: 20, h: 14, vx: 0, vy: 0, dir: 1, timer: 0, alive: true });
  }
  // Villagers
  for (let i = 0; i < 8; i++) {
    const x = 10 + Math.floor(Math.random() * (WORLD_W - 20));
    entities.push({ type: 'villager', x: x * BLOCK_SIZE, y: (surfaceY[x] - 2) * BLOCK_SIZE, w: 18, h: 26, vx: 0, vy: 0, dir: 1, timer: 0, alive: true });
  }
}

// ==================== PLAYER ====================
let player = {
  x: 150 * BLOCK_SIZE,
  y: 0,
  w: PLAYER_W,
  h: PLAYER_H,
  vx: 0,
  vy: 0,
  onGround: false,
  selectedSlot: 0,
  inventory: [
    { id: 1, count: 64 },
    { id: 2, count: 64 },
    { id: 3, count: 64 },
    { id: 4, count: 32 },
    { id: 8, count: 32 },
    { id: 9, count: 32 },
    { id: 5, count: 32 },
    { id: 10, count: 16 },
    { id: 11, count: 16 },
  ]
};

// ==================== CAMERA ====================
let camera = { x: 0, y: 0 };

// ==================== INPUT ====================
let keys = { up: false, down: false, left: false, right: false };
let touching = { up: false, down: false, left: false, right: false };

function setupControls() {
  const btns = {
    'btnUp': 'up', 'btnDown': 'down', 'btnLeft': 'left', 'btnRight': 'right'
  };
  for (const [id, key] of Object.entries(btns)) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); touching[key] = true; });
    el.addEventListener('touchend', e => { e.preventDefault(); touching[key] = false; });
    el.addEventListener('touchcancel', e => { touching[key] = false; });
    el.addEventListener('mousedown', e => { touching[key] = true; });
    el.addEventListener('mouseup', e => { touching[key] = false; });
  }

  document.getElementById('breakBtn').addEventListener('touchstart', e => { e.preventDefault(); breakBlock(); });
  document.getElementById('breakBtn').addEventListener('mousedown', e => { breakBlock(); });
  document.getElementById('placeBtn').addEventListener('touchstart', e => { e.preventDefault(); placeBlock(); });
  document.getElementById('placeBtn').addEventListener('mousedown', e => { placeBlock(); });
  document.getElementById('jumpBtn').addEventListener('touchstart', e => { e.preventDefault(); jump(); });
  document.getElementById('jumpBtn').addEventListener('mousedown', e => { jump(); });

  // Touch on canvas for block interaction
  canvas.addEventListener('touchstart', handleTouch);
  canvas.addEventListener('mousedown', handleClick);
}

function jump() {
  if (player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }
}

// ==================== BLOCK INTERACTION ====================
let breakTarget = null;
let breakProgress = 0;

function getTargetBlock() {
  const pcx = player.x + player.w / 2;
  const pcy = player.y + player.h / 2;
  const dir = player.facing || 1;
  const reach = 5;

  for (let d = 1; d <= reach; d++) {
    const tx = Math.floor((pcx + dir * d * BLOCK_SIZE) / BLOCK_SIZE);
    const ty = Math.floor(pcy / BLOCK_SIZE);
    // Also check above and below
    for (let dy = -2; dy <= 2; dy++) {
      const checkY = ty + dy;
      if (tx >= 0 && tx < WORLD_W && checkY >= 0 && checkY < WORLD_H) {
        if (world[tx][checkY] !== 0) {
          return { x: tx, y: checkY };
        }
      }
    }
  }
  return null;
}

function breakBlock() {
  const target = getTargetBlock();
  if (!target) return;
  const block = world[target.x][target.y];
  if (block === 0 || block === 6) return;

  // Add to inventory
  const dropId = block === 1 ? 2 : block; // Grass drops dirt
  let slot = player.inventory.findIndex(s => s.id === dropId);
  if (slot === -1 && player.inventory.length < 9) {
    player.inventory.push({ id: dropId, count: 1 });
  } else if (slot !== -1 && player.inventory[slot].count < 64) {
    player.inventory[slot].count++;
  }
  world[target.x][target.y] = 0;
  updateInventoryUI();
}

function placeBlock() {
  const target = getTargetBlock();
  if (!target) return;

  const slot = player.inventory[player.selectedSlot];
  if (!slot || slot.count <= 0) return;

  // Place on top of the target block
  const placeY = target.y - 1;
  if (placeY < 0 || placeY >= WORLD_H) return;
  if (world[target.x][placeY] !== 0) return;

  // Don't place inside player
  const pbx = target.x * BLOCK_SIZE;
  const pby = placeY * BLOCK_SIZE;
  if (player.x < pbx + BLOCK_SIZE && player.x + player.w > pbx &&
      player.y < pby + BLOCK_SIZE && player.y + player.h > pby) return;

  world[target.x][placeY] = slot.id;
  slot.count--;
  if (slot.count <= 0) {
    player.inventory.splice(player.selectedSlot, 1);
    if (player.selectedSlot >= player.inventory.length) player.selectedSlot = Math.max(0, player.inventory.length - 1);
  }
  updateInventoryUI();
}

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ==================== DAY/NIGHT CYCLE ====================
let gameTime = 0; // 0-24000 ticks
const DAY_LENGTH = 12000;

function getTimeOfDay() {
  const t = gameTime % DAY_LENGTH;
  if (t < 1000) return { name: 'Amanecer', icon: '🌅', sky: '#ff8844', light: 0.6 };
  if (t < 3000) return { name: 'Mañana', icon: '☀️', sky: '#87CEEB', light: 1.0 };
  if (t < 8000) return { name: 'Dia', icon: '☀️', sky: '#5ba3d9', light: 1.0 };
  if (t < 10000) return { name: 'Tarde', icon: '🌇', sky: '#ff9944', light: 0.7 };
  if (t < 11000) return { name: 'Atardecer', icon: '🌆', sky: '#cc4422', light: 0.4 };
  if (t < 12000) return { name: 'Noche', icon: '🌙', sky: '#0a0a2e', light: 0.15 };
  return { name: 'Media Noche', icon: '🌑', sky: '#050515', light: 0.1 };
}

function getSkyColor() {
  const t = gameTime % DAY_LENGTH;
  if (t < 1000) { const p = t / 1000; return lerpColor('#0a0a2e', '#ff8844', p); }
  if (t < 2000) { const p = (t - 1000) / 1000; return lerpColor('#ff8844', '#87CEEB', p); }
  if (t < 8000) return '#5ba3d9';
  if (t < 10000) { const p = (t - 8000) / 2000; return lerpColor('#5ba3d9', '#ff9944', p); }
  if (t < 11000) { const p = (t - 10000) / 1000; return lerpColor('#ff9944', '#0a0a2e', p); }
  return '#050515';
}

function getLightLevel() {
  const t = gameTime % DAY_LENGTH;
  if (t < 1000) return 0.3 + (t / 1000) * 0.7;
  if (t < 8000) return 1.0;
  if (t < 10000) return 1.0 - ((t - 8000) / 2000) * 0.8;
  if (t < 11000) return 0.2 - ((t - 10000) / 1000) * 0.1;
  return 0.1;
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.replace('#', ''), 16);
  const bh = parseInt(b.replace('#', ''), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return '#' + ((rr << 16) | (rg << 8) | rb).toString(16).padStart(6, '0');
}

// ==================== COLLISION ====================
function isSolid(bx, by) {
  if (bx < 0 || bx >= WORLD_W || by < 0 || by >= WORLD_H) return true;
  const block = world[bx][by];
  return BLOCKS[block] && BLOCKS[block].solid;
}

function collideX() {
  const left = Math.floor(player.x / BLOCK_SIZE);
  const right = Math.floor((player.x + player.w - 1) / BLOCK_SIZE);
  const top = Math.floor(player.y / BLOCK_SIZE);
  const bottom = Math.floor((player.y + player.h - 1) / BLOCK_SIZE);

  for (let bx = left; bx <= right; bx++) {
    for (let by = top; by <= bottom; by++) {
      if (isSolid(bx, by)) {
        if (player.vx > 0) {
          player.x = bx * BLOCK_SIZE - player.w;
          player.vx = 0;
        } else if (player.vx < 0) {
          player.x = (bx + 1) * BLOCK_SIZE;
          player.vx = 0;
        }
        return;
      }
    }
  }
}

function collideY() {
  const left = Math.floor(player.x / BLOCK_SIZE);
  const right = Math.floor((player.x + player.w - 1) / BLOCK_SIZE);
  const top = Math.floor(player.y / BLOCK_SIZE);
  const bottom = Math.floor((player.y + player.h - 1) / BLOCK_SIZE);

  player.onGround = false;
  for (let bx = left; bx <= right; bx++) {
    for (let by = top; by <= bottom; by++) {
      if (isSolid(bx, by)) {
        if (player.vy > 0) {
          player.y = by * BLOCK_SIZE - player.h;
          player.vy = 0;
          player.onGround = true;
        } else if (player.vy < 0) {
          player.y = (by + 1) * BLOCK_SIZE;
          player.vy = 0;
        }
        return;
      }
    }
  }
}

// ==================== ENTITY AI ====================
function updateEntities() {
  for (const e of entities) {
    if (!e.alive) continue;
    e.timer++;

    // Random movement
    if (e.timer % 120 === 0) {
      e.dir = Math.random() > 0.5 ? 1 : -1;
      e.vx = (Math.random() * 0.8 + 0.3) * e.dir;
    }

    // Gravity
    e.vy += GRAVITY * 0.5;

    // Move X
    e.x += e.vx;
    const ebx1 = Math.floor(e.x / BLOCK_SIZE);
    const ebx2 = Math.floor((e.x + e.w) / BLOCK_SIZE);
    const eby = Math.floor((e.y + e.h - 1) / BLOCK_SIZE);
    if (isSolid(ebx1, eby) || isSolid(ebx2, eby)) {
      e.vx *= -1;
      e.x += e.vx * 2;
    }

    // Move Y
    e.y += e.vy;
    const eby1 = Math.floor(e.y / BLOCK_SIZE);
    const eby2 = Math.floor((e.y + e.h) / BLOCK_SIZE);
    const ebx = Math.floor((e.x + e.w / 2) / BLOCK_SIZE);
    if (isSolid(ebx, eby2)) {
      e.y = eby2 * BLOCK_SIZE - e.h;
      e.vy = 0;
      // Random jump
      if (Math.random() < 0.02 && e.type !== 'villager') {
        e.vy = -5;
      }
    }

    // Bounds
    if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); }
    if (e.x > WORLD_W * BLOCK_SIZE - e.w) { e.x = WORLD_W * BLOCK_SIZE - e.w; e.vx = -Math.abs(e.vx); }
    if (e.y > WORLD_H * BLOCK_SIZE) { e.alive = false; }
  }
}

// ==================== DRAWING ====================
function drawEntity(e) {
  if (!e.alive) return;
  const sx = e.x - camera.x;
  const sy = e.y - camera.y;

  if (sx > window.innerWidth + 50 || sx + e.w < -50 || sy > window.innerHeight + 50 || sy + e.h < -50) return;

  ctx.save();
  ctx.translate(sx + e.w / 2, sy + e.h / 2);
  if (e.dir < 0) ctx.scale(-1, 1);
  ctx.translate(-e.w / 2, -e.h / 2);

  if (e.type === 'cow') {
    // Body
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(2, 2, 20, 12);
    // Spots
    ctx.fillStyle = '#f5f5dc';
    ctx.fillRect(4, 4, 6, 4);
    ctx.fillRect(14, 6, 5, 3);
    // Head
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(16, 0, 8, 8);
    // Eye
    ctx.fillStyle = '#000';
    ctx.fillRect(20, 2, 2, 2);
    // Legs
    ctx.fillStyle = '#6B3410';
    ctx.fillRect(4, 14, 3, 6);
    ctx.fillRect(10, 14, 3, 6);
    ctx.fillRect(16, 14, 3, 6);
  } else if (e.type === 'sheep') {
    // Body
    ctx.fillStyle = e.wool;
    ctx.fillRect(2, 2, 16, 10);
    // Wool texture
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(4, 3, 4, 4);
    ctx.fillRect(10, 4, 4, 4);
    // Head
    ctx.fillStyle = '#333';
    ctx.fillRect(14, 0, 6, 6);
    // Eye
    ctx.fillStyle = '#fff';
    ctx.fillRect(17, 1, 2, 2);
    // Legs
    ctx.fillStyle = '#333';
    ctx.fillRect(3, 12, 2, 5);
    ctx.fillRect(8, 12, 2, 5);
    ctx.fillRect(13, 12, 2, 5);
  } else if (e.type === 'wolf') {
    // Body
    ctx.fillStyle = '#888';
    ctx.fillRect(2, 2, 16, 8);
    // Head
    ctx.fillStyle = '#999';
    ctx.fillRect(14, 0, 6, 6);
    // Snout
    ctx.fillStyle = '#aaa';
    ctx.fillRect(18, 2, 4, 3);
    // Eye
    ctx.fillStyle = '#000';
    ctx.fillRect(16, 1, 2, 2);
    // Legs
    ctx.fillStyle = '#777';
    ctx.fillRect(3, 10, 2, 5);
    ctx.fillRect(8, 10, 2, 5);
    ctx.fillRect(13, 10, 2, 5);
    // Tail
    ctx.fillStyle = '#999';
    ctx.fillRect(0, 0, 4, 4);
  } else if (e.type === 'villager') {
    // Body
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(2, 8, 14, 14);
    // Head
    ctx.fillStyle = '#d4a574';
    ctx.fillRect(4, 0, 10, 10);
    // Nose
    ctx.fillStyle = '#c49464';
    ctx.fillRect(10, 5, 3, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(5, 3, 3, 3);
    ctx.fillRect(10, 3, 3, 3);
    ctx.fillStyle = '#2c1810';
    ctx.fillRect(6, 4, 2, 2);
    ctx.fillRect(11, 4, 2, 2);
    // Legs
    ctx.fillStyle = '#5a4020';
    ctx.fillRect(4, 22, 4, 5);
    ctx.fillRect(10, 22, 4, 5);
    // Arms
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(0, 10, 3, 8);
  }
  ctx.restore();
}

function drawPlayer() {
  const sx = player.x - camera.x;
  const sy = player.y - camera.y;

  ctx.save();
  ctx.translate(sx + player.w / 2, sy + player.h / 2);
  if (player.facing < 0) ctx.scale(-1, 1);
  ctx.translate(-player.w / 2, -player.h / 2);

  // Head
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(3, 0, 14, 10);
  // Hair
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(3, 0, 14, 4);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(5, 5, 4, 3);
  ctx.fillRect(11, 5, 4, 3);
  ctx.fillStyle = '#2c1810';
  ctx.fillRect(7, 6, 2, 2);
  ctx.fillRect(13, 6, 2, 2);
  // Mouth
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(8, 8, 4, 1);

  // Body
  ctx.fillStyle = '#5a8f3c';
  ctx.fillRect(2, 10, 16, 10);

  // Arms
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(0, 10, 3, 8);
  ctx.fillRect(17, 10, 3, 8);

  // Legs
  ctx.fillStyle = '#3d5a99';
  ctx.fillRect(3, 20, 6, 8);
  ctx.fillRect(11, 20, 6, 8);

  // Shoes
  ctx.fillStyle = '#333';
  ctx.fillRect(3, 26, 6, 2);
  ctx.fillRect(11, 26, 6, 2);

  ctx.restore();
}

function drawSky() {
  const skyColor = getSkyColor();
  ctx.fillStyle = skyColor;
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  // Sun/Moon
  const t = gameTime % DAY_LENGTH;
  let celestialY, celestialX;

  if (t < 11000) {
    // Sun
    const progress = t / 11000;
    celestialX = window.innerWidth * 0.1 + window.innerWidth * 0.8 * progress;
    celestialY = 40 + Math.sin(progress * Math.PI) * -30;
    // Sun glow
    const gradient = ctx.createRadialGradient(celestialX, celestialY, 0, celestialX, celestialY, 60);
    gradient.addColorStop(0, 'rgba(255,200,50,0.8)');
    gradient.addColorStop(0.5, 'rgba(255,200,50,0.2)');
    gradient.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(celestialX - 60, celestialY - 60, 120, 120);
    // Sun body
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(celestialX, celestialY, 20, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Moon
    const progress = (t - 11000) / (DAY_LENGTH - 11000);
    celestialX = window.innerWidth * 0.1 + window.innerWidth * 0.8 * progress;
    celestialY = 40 + Math.sin(progress * Math.PI) * -30;
    ctx.fillStyle = '#dde8f0';
    ctx.beginPath();
    ctx.arc(celestialX, celestialY, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = getSkyColor();
    ctx.beginPath();
    ctx.arc(celestialX + 6, celestialY - 4, 14, 0, Math.PI * 2);
    ctx.fill();
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 30; i++) {
      const sx = noise(i, 123) * window.innerWidth;
      const sy = noise(i, 456) * window.innerHeight * 0.5;
      const size = noise(i, 789) * 2 + 1;
      ctx.fillRect(sx, sy, size, size);
    }
  }

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const cloudOffset = gameTime * 0.05;
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 200 + cloudOffset) % (window.innerWidth + 200)) - 100;
    const cy = 30 + i * 15;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 40 + i * 5, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 25, cy - 5, 30, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawWorld() {
  const startBX = Math.max(0, Math.floor(camera.x / BLOCK_SIZE) - 1);
  const endBX = Math.min(WORLD_W, Math.ceil((camera.x + window.innerWidth) / BLOCK_SIZE) + 1);
  const startBY = Math.max(0, Math.floor(camera.y / BLOCK_SIZE) - 1);
  const endBY = Math.min(WORLD_H, Math.ceil((camera.y + window.innerHeight) / BLOCK_SIZE) + 1);

  for (let bx = startBX; bx < endBX; bx++) {
    for (let by = startBY; by < endBY; by++) {
      const block = world[bx][by];
      if (block === 0) continue;

      const sx = bx * BLOCK_SIZE - camera.x;
      const sy = by * BLOCK_SIZE - camera.y;

      const tex = getTexture(block);
      ctx.drawImage(tex, sx, sy, BLOCK_SIZE, BLOCK_SIZE);

      // Light overlay
      const light = getLightLevel();
      if (light < 1) {
        ctx.fillStyle = `rgba(0,0,20,${(1 - light) * 0.6})`;
        ctx.fillRect(sx, sy, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }
}

function drawHighlight() {
  const target = getTargetBlock();
  if (!target) return;
  const sx = target.x * BLOCK_SIZE - camera.x;
  const sy = target.y * BLOCK_SIZE - camera.y;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, BLOCK_SIZE, BLOCK_SIZE);
}

// ==================== INVENTORY UI ====================
function updateInventoryUI() {
  const bar = document.getElementById('inventoryBar');
  bar.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const slot = document.createElement('div');
    slot.className = 'inv-slot' + (i === player.selectedSlot ? ' selected' : '');
    if (player.inventory[i]) {
      const item = player.inventory[i];
      const texCanvas = getTexture(item.id);
      slot.appendChild(texCanvas.cloneNode(true));
      if (item.count > 1) {
        const count = document.createElement('span');
        count.className = 'inv-count';
        count.textContent = item.count;
        slot.appendChild(count);
      }
    }
    slot.addEventListener('touchstart', e => { e.preventDefault(); player.selectedSlot = i; updateInventoryUI(); });
    slot.addEventListener('mousedown', e => { player.selectedSlot = i; updateInventoryUI(); });
    bar.appendChild(slot);
  }
}

// ==================== TOUCH/CANVAS INTERACTION ====================
let touchStartX = 0;
let touchStartY = 0;
let isDragging = false;

function handleTouch(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const wx = touch.clientX + camera.x;
  const wy = touch.clientY + camera.y;
  const bx = Math.floor(wx / BLOCK_SIZE);
  const by = Math.floor(wy / BLOCK_SIZE);

  if (bx >= 0 && bx < WORLD_W && by >= 0 && by < WORLD_H) {
    if (world[bx][by] !== 0) {
      // Break
      const block = world[bx][by];
      if (block === 6) return;
      const dropId = block === 1 ? 2 : block;
      let slot = player.inventory.findIndex(s => s.id === dropId);
      if (slot === -1 && player.inventory.length < 9) {
        player.inventory.push({ id: dropId, count: 1 });
      } else if (slot !== -1 && player.inventory[slot].count < 64) {
        player.inventory[slot].count++;
      }
      world[bx][by] = 0;
      updateInventoryUI();
    } else {
      // Place
      const slot = player.inventory[player.selectedSlot];
      if (slot && slot.count > 0) {
        world[bx][by] = slot.id;
        slot.count--;
        if (slot.count <= 0) {
          player.inventory.splice(player.selectedSlot, 1);
          if (player.selectedSlot >= player.inventory.length) player.selectedSlot = Math.max(0, player.inventory.length - 1);
        }
        updateInventoryUI();
      }
    }
  }
}

function handleClick(e) {
  const wx = e.clientX + camera.x;
  const wy = e.clientY + camera.y;
  const bx = Math.floor(wx / BLOCK_SIZE);
  const by = Math.floor(wy / BLOCK_SIZE);

  if (bx >= 0 && bx < WORLD_W && by >= 0 && by < WORLD_H) {
    if (world[bx][by] !== 0) {
      const block = world[bx][by];
      if (block === 6) return;
      const dropId = block === 1 ? 2 : block;
      let slot = player.inventory.findIndex(s => s.id === dropId);
      if (slot === -1 && player.inventory.length < 9) {
        player.inventory.push({ id: dropId, count: 1 });
      } else if (slot !== -1 && player.inventory[slot].count < 64) {
        player.inventory[slot].count++;
      }
      world[bx][by] = 0;
      updateInventoryUI();
    } else {
      const slot = player.inventory[player.selectedSlot];
      if (slot && slot.count > 0) {
        world[bx][by] = slot.id;
        slot.count--;
        if (slot.count <= 0) {
          player.inventory.splice(player.selectedSlot, 1);
          if (player.selectedSlot >= player.inventory.length) player.selectedSlot = Math.max(0, player.inventory.length - 1);
        }
        updateInventoryUI();
      }
    }
  }
}

// ==================== MAIN LOOP ====================
let lastTime = 0;
let fps = 0;
let frameCount = 0;
let fpsTime = 0;

function update(dt) {
  // Movement
  player.vx = 0;
  if (touching.left || keys.left) { player.vx = -MOVE_SPEED; player.facing = -1; }
  if (touching.right || keys.right) { player.vx = MOVE_SPEED; player.facing = 1; }

  // Apply gravity
  player.vy += GRAVITY;

  // Move X
  player.x += player.vx;
  collideX();

  // Move Y
  player.y += player.vy;
  collideY();

  // World bounds
  if (player.x < 0) player.x = 0;
  if (player.x > WORLD_W * BLOCK_SIZE - player.w) player.x = WORLD_W * BLOCK_SIZE - player.w;
  if (player.y > WORLD_H * BLOCK_SIZE) {
    player.y = 0;
    player.vy = 0;
  }

  // Camera follow
  const targetCX = player.x + player.w / 2 - window.innerWidth / 2;
  const targetCY = player.y + player.h / 2 - window.innerHeight / 2;
  camera.x += (targetCX - camera.x) * 0.15;
  camera.y += (targetCY - camera.y) * 0.15;

  // Clamp camera
  camera.x = Math.max(0, Math.min(camera.x, WORLD_W * BLOCK_SIZE - window.innerWidth));
  camera.y = Math.max(0, Math.min(camera.y, WORLD_H * BLOCK_SIZE - window.innerHeight));

  // Time
  gameTime += 1;

  // Entities
  updateEntities();

  // Update UI
  const px = Math.floor(player.x / BLOCK_SIZE);
  const py = Math.floor(player.y / BLOCK_SIZE);
  document.getElementById('coords').textContent = `X: ${px}  Y: ${py}`;

  const tod = getTimeOfDay();
  document.getElementById('timeText').textContent = tod.name;
  document.getElementById('timeIcon').innerHTML = `<svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" fill="${tod.name.includes('Noche') || tod.name.includes('Media') ? '#dde8f0' : '#ffdd44'}"/></svg>`;
}

function render() {
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  drawSky();
  drawWorld();
  drawHighlight();

  // Entities
  for (const e of entities) {
    drawEntity(e);
  }

  drawPlayer();

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - fpsTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    fpsTime = now;
  }
}

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
function init() {
  generateWorld();

  // Place player on surface
  player.x = 150 * BLOCK_SIZE;
  player.y = (surfaceY[150] - 3) * BLOCK_SIZE;
  player.facing = 1;

  spawnEntities();
  setupControls();
  updateInventoryUI();

  player.facing = 1;

  requestAnimationFrame(gameLoop);
}

init();

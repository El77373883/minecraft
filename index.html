*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,-,sans-serif}
#game{display:block;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}

#time{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:#fff;padding:6px 10px;border-radius:6px;display:flex;align-items:center;gap:6px}
#mode{position:absolute;top:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.7);padding:4px 10px;border-radius:6px;font-size:10px;letter-spacing:1px}
#inv{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);padding:6px;border-radius:10px;border:1px solid rgba(255,255,255,0.1)}
.slot{width:44px;height:44px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;pointer-events:auto;position:relative}
.slot.sel{border-color:#5a8f3c;background:rgba(90,143,60,0.25);box-shadow:0 0 10px rgba(90,143,60,0.4)}
.slot canvas{width:32px;height:32px;image-rendering:pixelated}
.cnt{position:absolute;bottom:2px;right:4px;color:#fff;font-size:9px;font-weight:700;text-shadow:0 1px 2px #000}
#ctrls{position:absolute;inset:0;pointer-events:auto}
#joy{position:absolute;bottom:80px;left:20px;width:120px;height:120px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:50%;touch-action:none}
#joy-k{position:absolute;width:40px;height:40px;background:rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.5);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#look{position:absolute;top:0;right:0;width:50%;height:70%;touch-action:none}
#acts{position:absolute;bottom:80px;right:20px;display:flex;gap:12px;pointer-events:auto}

// ==================== CONFIG ====================
const BLOCK_SIZE = 32;
const WORLD_W = 300;
const WORLD_H = 120;
const GRAVITY = 0.45;
const JUMP_FORCE = -8.5;
const MOVE_SPEED = 3.2;
const PLAYER_W = 20;
const PLAYER_H = 28;

// ==================== STATE ====================
let canvas, ctx;
let camera = { x: 0, y:0 };
let player = {
  x: 150 * BLOCK_SIZE,
  y: 0,
  w: PLAYER_W,
  h: PLAYER_H,
  vx: 0,
  vy: 0,
  onGround: false,
  yaw: 0,
  pitch: 0,
  selectedSlot: 0,
  inventory: [
    { id: 1, count: 64 },
    { id: 2, count: 64 },
    { id: 3, count: 64 },
    { id: 4, count: 32 },
    { id: 8, count: 32 },
    { id: 5, count: 32 },
    { id: 11, count: 16 },
    { id: 6, count: 16 },
    { id: 10, count: 16 }
  ]
};
let world = [];
let entities = [];
let gameTime = 0;
let joy = { x: 0, y: 0 };
let touching = { joy: false, look: false };
let lastTouch = null;

// ==================== INIT ====================
function init() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  resize();
  generateWorld();
  spawnEntities();
  setupControls();
  requestAnimationFrame(loop);
}

function resize() {
  canvas.width = window.innerWidth * window.devicePixelRatio;
  canvas.height = window.innerHeight * window.devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

// ==================== WORLD GENERATION ====================
function noise(x, z) {
  const n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

function terrainHeight(x, z) {
  const base = 50;
  const h1 = noise(x * 0.02, z * 0.02) * 20;
  const h2 = noise(x * 0.05, z * 0.05) * 8;
  const h3 = noise(x * 0.1, z * 0.1) * 4;
  return Math.floor(base + h1 + h2 + h3);
}

function generateWorld() {
  world = [];
  for (let x = 0; x < WORLD_W; x++) {
    world[x] = [];
    for (let z = 0; z < WORLD_W; z++) {
      const sy = terrainHeight(x, z);
      for (let y = 0; y < WORLD_H; y++) {
        if (y < sy) {
          world[x][y] = 0;
        } else if (y === sy) {
          world[x][y] = 1;
        } else if (y < sy + 4) {
          world[x][y] = 2;
        } else if (y < sy + 20) {
          world[x][y] = Math.random() < 0.03 ? 15 : 3;
        } else {
          world[x][y] = 3;
        }
      }
      // Water
      if (sy > 52) {
        for (let y = 52; y <= sy; y++) {
          if (world[x][y] === 0) world[x][y] = 6;
        }
      }
    }
  }

  // Trees
  for (let x = 10; x < WORLD_W - 10; x += 8 + Math.floor(Math.random() * 6)) {
    for (let z = 10; z < WORLD_W - 10; z += 8 + Math.floor(Math.random() * 6)) {
      if (Math.random() > 0.8) {
        const sy = terrainHeight(x, z);
        if (sy > 50) {
          const th = 4 + Math.floor(Math.random() * 3);
          for (let dy = 1; dy <= th; dy++) {
            setBlock(x, sy + dy, z, 4);
          }
          for (let dx = -2; dx <= 2; dx++) {
            for (let dz = -2; dz <= 2; dz++) {
              for (let dy = th - 1; dy <= th + 1; dy++) {
                if (Math.abs(dx) + Math.abs(dz) + Math.abs(dy - th) < 4) {
                  setBlock(x + dx, sy + dy, z + dz, 5);
                }
              }
            }
          }
        }
      }
    }
  }

  // Villages
  for (let = 0; i < 3; i++) {
    const x = 50 + Math.floor(Math.random() * 200);
    const z = 50 + Math.floor(Math.random() * 200);
    const sy = terrainHeight(x, z);
    if (Math.abs(sy - 50) < 5) {
      for (let dx = 0; dx < 6; dx++) {
        for (let dy = 0; dy < 4; dy++) {
          setBlock(x + dx, sy - dy, z, dy === 3 ? 8 : 0);
        }
      }
      for (let dx = -1; dx <= 6; dx++) {
        setBlock(x + dx, sy - 4, z, 9);
      }
    }
  }
}

function setBlock(x, y, z, id) {
  if (x < 0 || x >= WORLD_W || z < 0 || z >= WORLD_W || y < 0 || y >= WORLD_H) return;
  if (id === 0) {
    if (world[x][y]) world[x][y] = 0;
  } else {
    world[x][y] = id;
  }
}

// ==================== ENTITIES ====================
function spawnEntities() {
  entities = [];
  for (let i = 0; i < 12; i++) {
    const x = 20 + Math.floor(Math.random() * 260);
    const z = 20 + Math.floor(Math.random() * 260);
    const sy = terrainHeight(x, z);
    entities.push({
      type: 'cow',
      x: x * BLOCK_SIZE,
      y: (sy - 1) * BLOCK_SIZE,
      z: z * BLOCK_SIZE,
      w: 24, h: 18,
      vx: 0, vz: 0,
      dir: Math.random() > 0.5 ? 1 : -1,
      timer: 0,
      alive: true
    });
  }
  for (let i = 0; i < 10; i++) {
    const x = 20 + Math.floor(Math.random() * 260);
    const z = 20 + Math.floor(Math.random() * 260);
    const sy = terrainHeight(x, z);
    entities.push({
      type: 'sheep',
      x: x * BLOCK_SIZE,
      y: (sy - 1) * BLOCK_SIZE,
      z: z * BLOCK_SIZE,
      w: 20, h: 16,
      vx: 0, vz: 0,
      dir: Math.random() > 0.5 ? 1 : -1,
      timer: 0,
      alive: true,
      wool: ['#f0f0f0', '#cc3333', '#3366cc', '#33aa33'][Math.floor(Math.random() * 4)]
    });
  }
  for (let i = 0; i < 6; i++) {
    const x = 20 + Math.floor(Math.random() * 60);
    const z = 20 + Math.floor(Math.random() * 260);
    const sy = terrainHeight(x, z);
    entities.push({
      type: 'wolf',
      x: x * BLOCK_SIZE,
      y: (sy - 1) * BLOCK_SIZE,
      z: z * BLOCK_SIZE,
      w: 20, h: 14,
      vx: 0, vz: 0,
      dir: 1,
      timer: 0,
      alive: true
    });
  }
  for (let i = 0; i < 4; i++) {
    const x = 20 + Math.floor(Math.random() * 260);
    const z = 20 + Math.floor(Math.random() * 260);
    const sy = terrainHeight(x, z);
    entities.push({
      type: 'villager',
      x: x * BLOCK_SIZE,
      y: (sy - 2) * BLOCK_SIZE,
      z: z * BLOCK_SIZE,
      w: 18, h: 26,
      vx: 0, vz: 0,
      dir: 1,
      timer: 0,
      alive: true
    });
  }
}

// ==================== CONTROLS ====================

  const joyEl = document.getElementById('joy');
  joyEl.addEventListener('touchstart', e => {
    e.preventDefault();
    touching.joy = true;
    lastTouch = e.touches[0];
  });
  window.addEventListener('touchmove', e => {
    if (!touching.joy) return;
    e.preventDefault();
    const t = e.touches[0];
    = joyEl.getBoundingClientRect();
    let dx = t.clientX - rect.left - 60;
    let dy = t.clientY - rect.top - 60;
    const d = Math.min(60, Math.hypot(dx, dy));
    dx = (dx / Math.hypot(dx, dy)) * d;
    dy = (dy / Math.hypot(dx, dy)) * d;
    joy.x = dx / 60;
    joy.y = dy / 60;
    document.getElementById('joy-k').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  });
  window.addEventListener('touchend', e => {
    if (touching.joy) {
      joy.x = 0;
      joy.y = 0;
      document.getElementById('joy-k').style.transform = 'translate(-50%, -50%)';
      touching.joy = false;
    }
  });

  const lookEl = document.getElementById('look');
  lookEl.addEventListener('touchstart', e => {
    e.preventDefault();
    touching.look = true;
    lastTouch = e.touches[0];
  });
  window.addEventListener('touchmove', e => {
    if (!touching.look) return;
    e.preventDefault    const t = e.touches[0];
    if (lastTouch) {
      player.yaw -= (t.clientX - lastTouch.clientX) * 0.002;
      player.pitch -= (t.clientY - lastTouch.clientY) * 0.002;
      player.pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.pitch));
      lastTouch = t;
    }
  });
  window.addEventListener('touchend', e => {
    touching.look = false;
    lastTouch = null;
  });

 document.getElementById('brk').addEventListener('touchstart', e => { e.preventDefault(); breakBlock(); });
  document.getElementById('plc').addEventListener('touchstart', e => { e.preventDefault(); placeBlock(); });
  document.getElementById('jmp').addEventListener('touchstart', e => { e.preventDefault(); jump(); });
}

function jump() {
  if (player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
  }
}

// ==================== BLOCK INTERACTION ====================
function getTargetBlock() {
  const dirX = Math.sin(player.yaw);
  const dirZ = Math.cos(player.yaw);
  const rayLen = 5;
  const px = player.x + player.w / 2;
  const pz = player.z + player.w / 2;
  const py = player.y + player.h / 2;

  for (let d = 1; d <= rayLen; d++) {
    const tx = Math.floor(px + dirX * d * BLOCK_SIZE) / BLOCK_SIZE;
    const tz = Math.floor(pz + dirZ * d * BLOCK_SIZE) / BLOCK_SIZE;
    const ty = Math.floor(py / BLOCK_SIZE);

    for (let dy = -2; dy <= 2;++) {
      const y = ty + dy;
      if (tx >= 0 && tx < WORLD_W && tz >= 0 && tz < WORLD_W && y >= 0 && y < WORLD_H) {
        if (world[tx][y] !== 0) {
          return { x: tx, y, z: tz };
        }
      }
    }
  }
  return null;
}

function breakBlock() {
  const target = getTargetBlock();
  if (!target) return;
  const id = world[target.x][target.y];
  if (id === 0 || id === 6) return;

  // Add to inventory
  const dropId = id === 1 ? 2 : id;
  let slot = player.inventory.findIndex(s => s.id === dropId);
  if (slot === -1 && player.inventory.length < 9) {
    player.inventory.push({ id: dropId, count: 1 });
  } else if (slot !== -1 && player.inventory[slot].count < 64) {
    player.inventory[slot].count++;
  }
  setBlock(target.x, target.y, target.z, 0);
  updateInventoryUI();
}

function placeBlock() {
  const target = getTargetBlock();
  if (!target) return;
  const slot = player.inventory[player.selectedSlot];
  if (!slot || slot.count <= 0) return;

  // Place on top of target
  const nx = target.x;
  const ny = target.y - 1;
  const nz = target.z;
  if (nx < 0 || nx >= WORLD_W || ny < 0 || ny >= WORLD_H || nz < 0 || nz >= WORLD_W) return;
  if (world[nx][ny] !== 0) return;

  // Don't place inside player
  const pbx = nx * BLOCK_SIZE;
  const pby = ny * BLOCK_SIZE;
  const pbz = nz * BLOCK_SIZE;
  if (player.x < pbx + BLOCK_SIZE && player.x + player.w > pbx &&
      player.z < pbz + BLOCK_SIZE && player.z + player.w > pbz &&
      player.y < pby + BLOCK_SIZE && player.y + player.h > pby) return;

  setBlock(nx, ny, nz, slot.id);
  slot.count--;
  if (slot.count <= 0) {
    player.inventory.splice(player.selectedSlot, 1);
    if (player.selectedSlot >= player.inventory.length) player.selectedSlot = Math.max(0, player.inventory.length - 1);
  }
  updateInventoryUI();
}

// ==================== PHYSICS ====================
function isSolid(x, y, z) {
  if (x < 0 || x >= WORLD_W || z < 0 || z >= WORLD_W || y < 0 || y >= WORLD_H) return true;
  return world[x][y] !== 0 && world[x][y] !== 6;
}

function collideX() {
  const left = Math.floor((player.x) / BLOCK_SIZE);
  const right = Math.floor((player.x + player.w - 1) / BLOCK_SIZE);
  const top = Math.floor((player.y) / BLOCK_SIZE);
  const bottom = Math.floor((player.y + player.h - 1) / BLOCK_SIZE);
  const front = Math.floor((player.z) / BLOCK_SIZE);
  const back = Math.floor((player.z + player.w - 1) / BLOCK_SIZE);

  for (let x = left; x <= right; x++) {
    for (let z = front; z <= back; z++) {
      for (let y = top; y <= bottom; y++) {
        if (isSolid(x, y, z)) {
          if (player.vx > 0) {
            player.x = x * BLOCK_SIZE - player.w;
            player.vx = 0;
          } else if (player.vx < 0) {
            player.x = (x + 1) * BLOCK_SIZE;
            player.vx = 0;
          }
          return;
        }
      }
    }
  }
}

function collideZ() {
  const left = Math.floor((player.x) / BLOCK_SIZE);
  const right = Math.floor((player.x + player.w - 1) / BLOCK_SIZE);
  const top = Math.floor((player.y) / BLOCK_SIZE);
  const bottom = Math.floor((player.y + player.h - 1) / BLOCK_SIZE);
  const front = Math.floor((player.z) / BLOCK_SIZE);
  const back = Math.floor((player.z + player.w - 1) / BLOCK_SIZE);

  for (let x = left; x <= right; x++) {
    for (let z = front; z <= back; z++) {
      for (let y = top; y <= bottom; y++) {
        if (isSolid(x, y, z)) {
          if (player.vz > 0) {
            player.z = z * BLOCK_SIZE - player.w;
            player.vz = 0;
          } else if (player.vz < 0) {
            player.z = (z + 1) * BLOCK_SIZE;
            player.vz = 0;
          }
          return;
        }
      }
    }
  }
}

function collideY() {
  const left = Math.floor((player.x) / BLOCK_SIZE);
  const right = Math.floor((player.x + player.w - 1) / BLOCK_SIZE);
  const front = Math.floor((player.z) / BLOCK_SIZE);
  const back = Math.floor((player.z + player.w - 1) / BLOCK_SIZE);
  const top = Math.floor((player.y) / BLOCK_SIZE);
  const bottom = Math.floor((player.y + player.h - 1) / BLOCK_SIZE);

  player.onGround = false;
  for (let x = left; x <= right; x++) {
    for (let z = front; z <= back; z++) {
      for (let y = top; y <= bottom; y++) {
        if (isSolid(x, y, z)) {
          if (player.vy > 0) {
            player.y = y * BLOCK_SIZE - player.h;
            player.vy = 0;
            player.onGround = true;
          } else if (player.vy < 0) {
            player.y = (y + 1) * BLOCK_SIZE;
            player.vy = 0;
          }
          return;
        }
      }
    }
  }
}

// ==================== DRAWING ====================
function drawBlock(x, y, id) {
  if (!TEXTURES[id]) return;
  const img = new Image();
  img.src = 'data:image/svg+xml;base64,' + btoa(TEXTURES[id]);
  img.onload = () => {
    ctx.drawImage(img, x, y);
  };
}

function drawWorld() {
  const startBX = Math.max(0, Math.floor((camera.x) / BLOCK_SIZE) - 2);
  const endBX = Math.min(WORLD_W, Math.ceil((camera.x + canvas.width / window.devicePixelRatio) / BLOCK_SIZE) + 2);
  const startBY = Math.max(0, Math.floor((camera.y) / BLOCK_SIZE) - 2);
  const endBY = Math.min(WORLD_H, Math.ceil((camera.y + canvas.height / window.devicePixelRatio) / BLOCK_SIZE) + 2);
  const startBZ = Math.max(0, Math.floor((camera.z) / BLOCK_SIZE) - 2);
  const endBZ = Math.min(WORLD_W, Math.ceil((camera.z + canvas.width / window.devicePixelRatio) / BLOCK_SIZE) + 2);

  for (let z = startBZ; z < endBZ; z++) {
    for (let x = startBX; x < endBX; x++) {
      for (let y = startBY; y < endBY; y++) {
        const id = world[x][y];
        if (id === 0) continue;
        const sx = x * BLOCK_SIZE - camera.x;
        const sy = y * BLOCK_SIZE - camera.y;
        const sz = z * BLOCK_SIZE - camera.z;
        // Simple orthographic projection for now
        if (sx > -BLOCK_SIZE && sx < canvas.width / window.devicePixelRatio &&
            sy -BLOCK_SIZE && sy < canvas.height / window.devicePixelRatio) {
          drawBlock(sx, sy, id);
        }
      }
    }
  }
}

function drawEntities() {
  for (const e of entities) {
    if (!e.alive) continue;
    const sx = e.x - camera.x;
    const sy = e.y - camera.y;
    const sz = e.z - camera.z;
    if (sx -50 && sx < canvas.width / window.devicePixelRatio + 50 &&
        sy > -50 && sy < canvas.height / window.devicePixelRatio + 50) {
      ctx.fillStyle = e.type === 'cow' ? '#8B4513' : 
                     e.type === 'sheep' ? e.wool : 
                     e.type === 'wolf' ? '#888' : '#8B6914';
      ctx.fillRect(sx, sy, e.w, e.h);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + e.w/2 - 2, sy + 4, 4, 4);
    }
  }
}

function drawPlayer() {
  const sx = player.x - camera.x;
  const sy = player.y - camera.y;
  const sz = player.z - camera.z;
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(sx, sy, player.w, player.h);
  ctx.fillStyle = '#2c1810';
  ctx.fillRect(sx + 4, sy + 4, 4, 4);
  ctx.fillRect(sx + player.w - 8, sy + 4, 4, 4);
}

function drawHighlight() {
  const target = getTargetBlock();
  if (!target) return;
  const sx = target.x * BLOCK_SIZE - camera.x;
  const sy = target.y * BLOCK_SIZE - camera.y;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, sy, BLOCK_SIZE, BLOCK_SIZE);
}

function updateInventoryUI() {
  const bar = document.getElementById('inv');
  bar.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot' + (i === player.selectedSlot ? ' sel' : '');
    if (player.inventory[i]) {
      const item = player.inventory[i];
      const img = new Image();
      img.src = 'data:image/svg+xml;base64,' + btoa(TEXTURES[item.id]);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        slot.appendChild(canvas);
        if (item.count > 1) {
          const cnt = document.createElement('span');
          cnt.className = 'cnt';
          cnt.textContent = item.count;
          slot.appendChild(cnt);
        }
      };
    }
    slot.addEventListener('touchstart', e => {
      e.preventDefault();
      player.selectedSlot = i;
      updateInventoryUI();
    });
    bar.appendChild(slot);
  }
}

// ==================== TIME & UI ====================
function getTimeOfDay() {
  const t = gameTime % 24000;
  if (t < 1000) return { name: 'Amanecer', icon: '🌅', sky: '#ff8844', light: 0.6 };
  if (t < 3000) return { name: 'Mañana', icon: '☀️', sky: '#87CEEB', light: 1.0 };
  if (t < 8000) return { name: 'Dia', icon: '☀️', sky: '#5ba3d9', light: 1.0 };
  if (t < 10000) return { name: 'Tarde', icon: '🌇', sky: '#ff9944', light: 0.7 };
  if (t < 11000) return { name: 'Atardecer', icon: '🌆', sky: '#cc4422', light: 0.4 };
  if (t < 12000) return { name: 'Noche', icon: '🌙', sky: '#0a0a2e',: 0.15 };
  return { name: 'Media Noche', icon: '🌑', sky: '#050515', light: 0.1 };
}

// ==================== MAIN LOOP ====================
function update(dt) {
  gameTime += dt * 100;

  // Movement
  player.vx = joy.x * MOVE_SPEED;
  player.vz = joy.y * MOVE_SPEED;

  // Apply gravity
  player.vy += GRAVITY * dt;

  // Move X
  player.x += player.vx * dt;
  collideX();

  // Move Z
  player.z += player.vz * dt;
  collideZ();

  // Move Y
  player.y += player.vy * dt;
  collideY();

  // Bounds
  if (player.x < 0) player.x = 0;
  if (player.x > WORLD_W * BLOCK_SIZE - player.w) player.x = WORLD_W * BLOCK_SIZE - player.w;
  (player.z < 0) player.z = 0;
  if (player.z > WORLD_W * BLOCK_SIZE - player.w) player.z = WORLD_W * BLOCK_SIZE - player.w;
  if (player.y > WORLD_H * BLOCK_SIZE) {
    player.y = 0;
    player.vy = 0;
  }

  // Camera follow
  camera.x = player.x + player.w / 2 - canvas.width / (2 * window.devicePixelRatio);
  camera.y = player.y + player.h / 2 - canvas.height / (2 * window.devicePixelRatio);
  camera.z = player.z + player.w / 2 - canvas.width / (2 * window.devicePixelRatio);

  // Update UI
  document.getElementById('coords').textContent = `X: ${Math.floor(player.x / BLOCK_SIZE)} Y: ${Math.floor(player.y / BLOCK_SIZE)} Z: ${Math.floor(player.z / BLOCK_SIZE)}`;
  const tod = getTimeOfDay();
  document.getElementById('tTxt').textContent = tod.name;
  document.getElementById('tIcon').innerHTML = `<svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" fill="${tod.name.includes('Noche') ? '#dde8f0' : '#ffdd44'}"/></svg>`;
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Sky
  const tod = getTimeOfDay();
  ctx.fillStyle = tod.sky;
  ctx.fillRect(0, 0, canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio);

  // World
  drawWorld();

  // Entities
  drawEntities();

  // Player
  drawPlayer();

  // Highlight
  drawHighlight();

  // FPS (optional)
  // ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(10,10,60,20); ctx.fillStyle='#fff'; ctx.fillText('FPS: '+Math.round(1000/dt),12,24);
}

let lastTime = 0;
function loop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  if (dt > 0) {
    update(dt / 1000);
    render();
  }
  requestAnimationFrame(loop);
}

// Start
init();
</script>

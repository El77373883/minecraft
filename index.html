<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AdrianCraft - World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{position:fixed;top:0;left:0;z-index:1;display:block;image-rendering:pixelated}

/* === GAME UI === */
#game-ui{position:fixed;inset:0;z-index:100;display:none;pointer-events:none}
#game-ui.active{display:block}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.9);border-radius:1px}
#crosshair::before{top:10px;left:0;width:22px;height:2px}
#crosshair::after{left:10px;top:0;height:22px;width:2px}

/* HUD */
#hud{position:absolute;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;pointer-events:none;z-index:110}
#health-bar,#hunger-bar,#xp-bar{display:flex;align-items:center;gap:3px;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:4px}
.heart,.drumstick,.xp-orb{width:18px;height:18px;image-rendering:pixelated}
.heart{background:url('image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path fill="%23e74c3c" d="M8 14s-6-4.35-6-8a4 4 0 0 1 8 0 4 4 0 0 1 8 0c0 3.65-6 8-6 8z"/></svg>') center/contain no-repeat}
.heart.half{background:url('image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path fill="%23e74c3c" d="M8 14s-6-4.35-6-8a4 4 0 0 1 8 0z"/></svg>') center/contain no-repeat}
.drumstick{background:url('image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path fill="%23d4a66a" d="M4 12c0-2 2-4 4-4s4 2 4 4H4z"/><circle fill="%238b6914" cx="8" cy="6" r="3"/></svg>') center/contain no-repeat}
.xp-orb{background:url('image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle fill="%233498db" cx="8" cy="8" r="6"/></svg>') center/contain no-repeat}

/* HOTBAR */
#hotbar{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,0.85);padding:5px;border-radius:4px;border:2px solid #555;pointer-events:auto;z-index:110}
.slot{width:42px;height:42px;border:2px solid #333;background:rgba(68,68,68,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;border-radius:3px}
.slot.active{border:2px solid #fff;background:rgba(85,85,85,0.95);box-shadow:0 0 8px rgba(255,255,255,0.5)}
.slot canvas{width:34px;height:34px;image-rendering:pixelated}
.slot-count{position:absolute;bottom:2px;right:4px;font-size:10px;color:#fff;text-shadow:1px 1px 0 #000}

/* CONTROLES */
#controls{position:absolute;inset:0;pointer-events:none;z-index:105}
#joystick{position:absolute;bottom:25px;left:25px;width:110px;height:110px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.35);border-radius:50%;pointer-events:auto;backdrop-filter:blur(2px)}
#knob{width:46px;height:46px;background:rgba(255,255,255,0.6);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,0.5)}
#look-zone{position:absolute;top:0;right:0;width:55%;height:calc(100% - 150px);pointer-events:auto}
.btn{position:absolute;pointer-events:auto;width:56px;height:56px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);border-radius:12px;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);transition:all 0.1s}
.btn:active{background:rgba(76,175,80,0.6);transform:scale(0.92);border-color:rgba(255,255,255,0.7)}
#btn-jump{bottom:150px;right:25px;border-radius:50%}
#btn-break{bottom:85px;right:100px;font-size:18px}
#btn-place{bottom:85px;right:25px;font-size:18px}
#btn-inventory{position:absolute;top:15px;right:15px;width:48px;height:48px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);border-radius:10px;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;pointer-events:auto;backdrop-filter:blur(3px)}
#btn-inventory:active{background:rgba(76,175,80,0.6)}
#btn-pause{position:absolute;top:15px;left:15px;width:48px;height:48px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);border-radius:10px;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;pointer-events:auto;backdrop-filter:blur(3px)}
#btn-pause:active{background:rgba(231,76,60,0.6)}

/* INVENTARIO */
#inventory-screen{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;pointer-events:auto}
#inventory-screen.active{display:flex}
#inventory-box{background:linear-gradient(180deg,#2a2a3a,#1a1a2a);border:4px solid #555;border-radius:8px;padding:20px;max-width:95%;max-height:85%;overflow-y:auto}
#inventory-title{color:#fff;font-size:1.4rem;margin-bottom:15px;text-align:center;text-shadow:0 0 10px rgba(76,175,80,0.5)}
#inventory-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.inv-slot{width:44px;height:44px;border:2px solid #444;background:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;border-radius:3px}
.inv-slot.active{border:2px solid #4CAF50;box-shadow:0 0 8px rgba(76,175,80,0.5)}
.inv-slot canvas{width:36px;height:36px;image-rendering:pixelated}
.inv-count{position:absolute;bottom:2px;right:4px;font-size:10px;color:#fff;text-shadow:1px 1px 0 #000}
#crafting-area{margin-top:15px;padding-top:15px;border-top:2px solid #444}
#crafting-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
#craft-result{width:44px;height:44px;border:2px solid #4CAF50;background:#2a3a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px}
#craft-result canvas{width:36px;height:36px;image-rendering:pixelated}
#craft-btn{padding:8px 20px;background:#4CAF50;color:#fff;border:2px solid #2d5a30;border-radius:4px;cursor:pointer;font-weight:bold}
#craft-btn:disabled{background:#555;cursor:not-allowed}

/* PAUSA */
#pause-menu{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;flex-direction:column;pointer-events:auto}
#pause-menu.active{display:flex}
#pause-title{color:#fff;font-size:2rem;margin-bottom:30px;text-shadow:0 0 15px rgba(76,175,80,0.5)}
.pause-btn{padding:12px 40px;margin:8px 0;font-size:1.1rem;background:#4CAF50;color:#fff;border:3px solid #2d5a30;border-radius:4px;cursor:pointer;font-weight:bold;width:200px}
.pause-btn:hover{background:#5dbd61}
.pause-btn.danger{background:#e74c3c;border-color:#a93226}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#fff;padding:12px 25px;border-radius:8px;border:2px solid #4CAF50;display:none;z-index:300;pointer-events:none;animation:toastSlide 0.3s ease}
@keyframes toastSlide{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* PÉTALOS */
#petals{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.petal{position:absolute;width:10px;height:10px;background:linear-gradient(135deg,#ffb7c5,#ff8fa3,#ffc0cb);border-radius:50% 50% 50% 0;opacity:0.85;animation:petalFall linear infinite}
@keyframes petalFall{0%{transform:translateY(-15px) rotate(0deg) scale(0.7);opacity:0}10%{opacity:0.85}90%{opacity:0.85}100%{transform:translateY(100vh) rotate(720deg) scale(1);opacity:0}}
</style>
</head>
<body>

<div id="game-ui">
  <div id="crosshair"></div>
  
  <!-- HUD -->
  <div id="hud">
    <div id="health-bar"></div>
    <div id="xp-bar"></div>
    <div id="hunger-bar"></div>
  </div>
  
  <!-- HOTBAR -->
  <div id="hotbar"></div>
  
  <!-- CONTROLS -->
  <div id="controls">
    <div id="joystick"><div id="knob"></div></div>
    <div id="look-zone"></div>
    <div class="btn" id="btn-jump">⬆️</div>
    <div class="btn" id="btn-break">⛏️</div>
    <div class="btn" id="btn-place">🧱</div>
    <div class="btn" id="btn-inventory">📦</div>
    <div class="btn" id="btn-pause">⏸️</div>
  </div>
  
  <!-- INVENTORY -->
  <div id="inventory-screen">
    <div id="inventory-box">
      <div id="inventory-title">Inventario</div>
      <div id="inventory-grid"></div>
      <div id="crafting-area">
        <div style="color:#aaa;margin-bottom:8px;font-size:0.9rem">Crafteo</div>
        <div id="crafting-grid"></div>
        <div id="craft-result"></div>
        <button id="craft-btn" disabled>Craftear</button>
      </div>
    </div>
  </div>
  
  <!-- PAUSE -->
  <div id="pause-menu">
    <div id="pause-title">AdrianCraft</div>
    <button class="pause-btn" id="resume-btn">▶ Continuar</button>
    <button class="pause-btn" id="save-btn">💾 Guardar</button>
    <button class="pause-btn" id="settings-btn">⚙️ Ajustes</button>
    <button class="pause-btn danger" id="exit-btn">🏠 Salir al Lobby</button>
  </div>
  
  <div id="toast"></div>
</div>

<div id="petals"></div>
<canvas id="game-canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === CONFIG ===
const CFG = {chunkSize:16,renderDist:4,seed:parseInt(new URLSearchParams(window.location.search).get('seed'))||Date.now(),waterLevel:4,dayLength:1200,gravity:20,jumpForce:7,speed:4.5,maxHealth:20,maxHunger:20,saveKey:'ac_save_v1'};
const W=innerWidth,H=innerHeight;

// === RENDERER ===
const canvas=document.getElementById('game-canvas'),renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.BasicShadowMap;renderer.setClearColor(0x87CEEB);

// === SCENE ===
const scene=new THREE.Scene();scene.fog=new THREE.Fog(0x87CEEB,30,55);
const camera=new THREE.PerspectiveCamera(70,W/H,0.1,200);

// === SONIDOS ===
const SFX={ctx:null,init(){try{this.ctx=new(AudioContext||webkitAudioContext)()}catch(e){}},play(t){if(!this.ctx)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);const s={break:{f:280,d:0.08,t:'square'},place:{f:220,d:0.07,t:'sine'},jump:{f:450,d:0.12,t:'sine'},hurt:{f:180,d:0.15,t:'sawtooth'},eat:{f:520,d:0.08,t:'sine'},craft:{f:650,d:0.15,t:'square'},cherry:{f:380,d:0.1,t:'sine'}}[t]||{f:300,d:0.1,t:'square'};o.frequency.setValueAtTime(s.f,this.ctx.currentTime);g.gain.setValueAtTime(0.08,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+s.d);o.type=s.t;o.start();o.stop(this.ctx.currentTime+s.d);if(navigator.vibrate&&['break','place','hurt'].includes(t))navigator.vibrate(25);}};SFX.init();

// === TEXTURAS ===
function mkTex(cfg){const s=16,c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');x.fillStyle=cfg.base;x.fillRect(0,0,s,s);if(cfg.pat)cfg.pat(x,s);for(let i=0;i<(cfg.n||20);i++)x.fillStyle=cfg.nc||'rgba(0,0,0,0.12)',x.fillRect(Math.random()*s|0,Math.random()*s|0,1,1);if(cfg.ov)cfg.ov(x,s);const t=new THREE.CanvasTexture(c);t.magFilter=t.minFilter=THREE.NearestFilter;return t;}
const TX={
grassT:mkTex({base:'#5B8731',pat:(x,s)=>{for(let i=0;i<15;i++)x.fillStyle=Math.random()>.5?'#6B9A3A':'#4A7428',x.fillRect(Math.random()*s|0,Math.random()*s|0,2,2)},n:12}),
grassS:mkTex({base:'#8B6914',pat:(x,s)=>{x.fillStyle='#5B8731';x.fillRect(0,0,s,4);for(let i=0;i<8;i++)if(Math.random()>.5)x.fillStyle='#6B9A3A',x.fillRect(Math.random()*s|0,4,1,2+Math.random()*2|0)},n:8}),
dirt:mkTex({base:'#8B6914',n:18}),stone:mkTex({base:'#7F7F7F',pat:(x,s)=>{x.fillStyle='#6A6A6A';x.fillRect(2,2,6,5);x.fillRect(10,1,5,4);x.fillRect(1,9,4,5);x.fillRect(9,10,5,4)},n:10}),
cobble:mkTex({base:'#6A6A6A',pat:(x,s)=>{x.fillStyle='#5A5A5A';x.fillRect(1,1,7,6);x.fillRect(9,1,6,5);x.fillRect(0,8,8,7);x.fillRect(9,7,7,8);x.fillStyle='#505050';x.fillRect(0,7,s,1);x.fillRect(8,0,1,8)},n:8}),
woodS:mkTex({base:'#5C3A1E',pat:(x,s)=>{x.fillStyle='#4A2E16';for(let y=0;y<s;y+=3)x.fillRect(0,y,s,2)},n:6}),
woodT:mkTex({base:'#8B7355',pat:(x,s)=>{x.strokeStyle='#6B5535';x.lineWidth=1;x.beginPath();x.arc(8,8,2.5,0,Math.PI*2);x.stroke();x.beginPath();x.arc(8,8,5.5,0,Math.PI*2);x.stroke()},n:5}),
leaves:mkTex({base:'#2D5A1E',pat:(x,s)=>{for(let i=0;i<25;i++)x.fillStyle=Math.random()>.5?'#3A7028':'#204A14',x.fillRect(Math.random()*s|0,Math.random()*s|0,2,2)},n:15,nc:'rgba(0,0,0,0.18)'}),
water:mkTex({base:'#3366CC',pat:(x,s)=>{x.fillStyle='rgba(100,180,255,0.5)';for(let i=0;i<10;i++)x.fillRect(0,Math.random()*s|0,s,2)},n:3}),
sand:mkTex({base:'#E2C97E',n:8}),snow:mkTex({base:'#F0F0F0',n:20,nc:'rgba(0,0,0,0.05)'}),
planks:mkTex({base:'#BC9458',pat:(x,s)=>{x.fillStyle='#A67D44';for(let i=0;i<4;i++)x.fillRect(i*4+2,0,2,s)},n:5}),
glass:mkTex({base:'rgba(200,230,255,0.35)',pat:(x,s)=>{x.strokeStyle='rgba(180,220,255,0.6)';x.lineWidth=1;x.strokeRect(1,1,14,14)},n:0}),
wool:mkTex({base:'#E8E8E8',n:22}),
cherryLog:mkTex({base:'#8B6F5A',pat:(x,s)=>{x.fillStyle='#7A5E4A';for(let y=0;y<s;y+=4)x.fillRect(0,y,s,2)},n:4}),
cherryLeaves:mkTex({base:'#FFB7C5',pat:(x,s)=>{x.fillStyle='#FF8FA3';for(let i=0;i<20;i++){x.beginPath();x.arc(Math.random()*s,s/2+Math.random()*4-2,2+Math.random()*2,0,Math.PI*2);x.fill()}},n:8,nc:'rgba(255,183,197,0.3)'}),
torch:mkTex({base:'#8B6914',pat:(x,s)=>{x.fillStyle='#FFA726';x.beginPath();x.moveTo(8,2);x.lineTo(5,10);x.lineTo(11,10);x.closePath();x.fill();x.fillStyle='#FFEB3B';x.beginPath();x.moveTo(8,4);x.lineTo(6.5,9);x.lineTo(9.5,9);x.closePath();x.fill()},n:0})};

const MT={
grass:[new THREE.MeshLambertMaterial({map:TX.grassS}),new THREE.MeshLambertMaterial({map:TX.grassS}),new THREE.MeshLambertMaterial({map:TX.grassT}),new THREE.MeshLambertMaterial({map:TX.dirt}),new THREE.MeshLambertMaterial({map:TX.grassS}),new THREE.MeshLambertMaterial({map:TX.grassS})],
dirt:new THREE.MeshLambertMaterial({map:TX.dirt}),stone:new THREE.MeshLambertMaterial({map:TX.stone}),cobble:new THREE.MeshLambertMaterial({map:TX.cobble}),
wood:[new THREE.MeshLambertMaterial({map:TX.woodS}),new THREE.MeshLambertMaterial({map:TX.woodS}),new THREE.MeshLambertMaterial({map:TX.woodT}),new THREE.MeshLambertMaterial({map:TX.woodT}),new THREE.MeshLambertMaterial({map:TX.woodS}),new THREE.MeshLambertMaterial({map:TX.woodS})],
leaves:new THREE.MeshLambertMaterial({map:TX.leaves,transparent:true,opacity:0.95}),water:new THREE.MeshLambertMaterial({map:TX.water,transparent:true,opacity:0.8}),
sand:new THREE.MeshLambertMaterial({map:TX.sand}),snow:new THREE.MeshLambertMaterial({map:TX.snow}),planks:new THREE.MeshLambertMaterial({map:TX.planks}),
glass:new THREE.MeshLambertMaterial({map:TX.glass,transparent:true,opacity:0.35}),wool:new THREE.MeshLambertMaterial({map:TX.wool}),
cherryLog:new THREE.MeshLambertMaterial({map:TX.cherryLog}),cherryLeaves:new THREE.MeshLambertMaterial({map:TX.cherryLeaves,transparent:true,opacity:0.9}),
torch:new THREE.MeshBasicMaterial({map:TX.torch,transparent:true})};

// === CHUNKS ===
class Chunk{constructor(cx,cz){this.cx=cx;this.cz=cz;this.meshes={};this.blocks={};this.loaded=false;}
getKey(){return`${this.cx},${this.cz}`;}
getBlock(x,y,z){return this.blocks[`${x},${y},${z}`];}
setBlock(x,y,z,type,upd=true){const k=`${x},${y},${z}`;if(this.blocks[k]&&this.blocks[k].mesh)this.removeMesh(k);if(type===null){delete this.blocks[k];return;}this.blocks[k]={type,x,y,z};if(upd)this.updateMesh(k,type);}
updateMesh(k,type){const m=MT[type];if(!m)return;const b=this.blocks[k],mesh=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),m);mesh.position.set(b.x,b.y,b.z);mesh.castShadow=mesh.receiveShadow=true;mesh.userData={k,type,chunk:this};scene.add(mesh);b.mesh=mesh;if(!this.meshes[type])this.meshes[type]=[];this.meshes[type].push(mesh);}
removeMesh(k){const b=this.blocks[k];if(!b||!b.mesh)return;scene.remove(b.mesh);if(this.meshes[b.type]){const i=this.meshes[b.type].indexOf(b.mesh);if(i>-1)this.meshes[b.type].splice(i,1);}delete b.mesh;}
generate(seed){const noise=(x,z)=>Math.sin(x*.1+seed)*Math.cos(z*.1+seed)*3+Math.sin(x*.3+z*.2)*1.5+Math.sin(x*.5)*.5+Math.cos(z*.4)*.8;const bio=(x,z)=>Math.sin(x*.02+seed*.1)*Math.cos(z*.02+seed*.1);
for(let lx=0;lx<CFG.chunkSize;lx++)for(let lz=0;lz<CFG.chunkSize;lz++){const wx=this.cx*CFG.chunkSize+lx,wz=this.cz*CFG.chunkSize+lz;const bv=bio(wx,wz);let bioT='plains';if(bv>.4)bioT='desert';else if(bv<-.4)bioT='snow';else if(bv>.1&&Math.sin(wx*.1)>.5)bioT='forest';else if(bv>-.2&&bv<.2)bioT='cherry';
let h=Math.floor(noise(wx,wz)+CFG.waterLevel+3);const cave=(x,y,z)=>Math.sin(x*.3)*Math.cos(y*.4)*Math.sin(z*.3);
for(let y=0;y<=h;y++){if(y<h-2&&cave(wx,y,wz)>.65)continue;let t;if(y===h){if(bioT==='desert')t='sand';else if(bioT==='snow')t='snow';else if(bioT==='cherry')t='grass';else t='grass';}else if(y>h-3)t='dirt';else if(y<10&&Math.random()>.95){const r=Math.random();if(r>.99)t='diamond_ore';else if(r>.97)t='gold_ore';else if(r>.93)t='iron_ore';else if(r>.85)t='coal_ore';else t='stone';}else t='stone';this.setBlock(wx,y,wz,t,false);}if(h<CFG.waterLevel)for(let wy=h+1;wy<=CFG.waterLevel;wy++)this.setBlock(wx,wy,wz,'water',false);}
if(bioT==='plains'||bioT==='forest')for(let i=0;i<(bioT==='forest'?7:2);i++){const lx=Math.floor(Math.random()*CFG.chunkSize),lz=Math.floor(Math.random()*CFG.chunkSize),wx=this.cx*CFG.chunkSize+lx,wz=this.cz*CFG.chunkSize+lz;for(let wy=CFG.waterLevel+1;wy<18;wy++)if(this.getBlock(wx,wy,wz)?.type==='grass'){for(let h=0;h<5;h++)this.setBlock(wx,wy+1+h,wz,'wood',false);for(let ox=-2;ox<=2;ox++)for(let oz=-2;oz<=2;oz++)for(let oy=4;oy<=7;oy++)if(Math.abs(ox)+Math.abs(oz)+Math.abs(oy-5.5)<5)this.setBlock(wx+ox,wy+oy,wz+oz,'leaves',false);break;}}
if(bioT==='cherry')for(let i=0;i<4;i++){const lx=Math.floor(Math.random()*CFG.chunkSize),lz=Math.floor(Math.random()*CFG.chunkSize),wx=this.cx*CFG.chunkSize+lx,wz=this.cz*CFG.chunkSize+lz;for(let wy=CFG.waterLevel+1;wy<16;wy++)if(this.getBlock(wx,wy,wz)?.type==='grass'){for(let h=0;h<4;h++)this.setBlock(wx,wy+1+h,wz,'cherryLog',false);for(let ox=-3;ox<=3;ox++)for(let oz=-3;oz<=3;oz++)for(let oy=3;oy<=6;oy++)if(Math.abs(ox)+Math.abs(oz)+Math.abs(oy-4.5)<6&&Math.random()>.25)this.setBlock(wx+ox,wy+oy,wz+oz,'cherryLeaves',false);break;}}
if(bioT==='desert')for(let i=0;i<3;i++){const lx=Math.floor(Math.random()*CFG.chunkSize),lz=Math.floor(Math.random()*CFG.chunkSize),wx=this.cx*CFG.chunkSize+lx,wz=this.cz*CFG.chunkSize+lz;for(let wy=CFG.waterLevel+1;wy<14;wy++)if(this.getBlock(wx,wy,wz)?.type==='sand'){for(let h=0;h<2+Math.random()*2|0;h++)this.setBlock(wx,wy+h,wz,'cactus',false);break;}}this.loaded=true;}
unload(){for(const t in this.meshes)for(const m of this.meshes[t])scene.remove(m);for(const k in this.blocks)delete this.blocks[k].mesh;this.meshes={};this.loaded=false;}}

const chunks={},loadedChunks=new Set();
function getChunk(wx,wz){const cx=Math.floor(wx/CFG.chunkSize),cz=Math.floor(wz/CFG.chunkSize),k=`${cx},${cz}`;if(!chunks[k])chunks[k]=new Chunk(cx,cz);return chunks[k];}
function loadChunks(px,pz){const pcx=Math.floor(px/CFG.chunkSize),pcz=Math.floor(pz/CFG.chunkSize),toLoad=[],toUnload=[];for(let dx=-CFG.renderDist;dx<=CFG.renderDist;dx++)for(let dz=-CFG.renderDist;dz<=CFG.renderDist;dz++){const k=`${pcx+dx},${pcz+dz}`;if(!loadedChunks.has(k))toLoad.push({k,cx:pcx+dx,cz:pcz+dz});}for(const k of loadedChunks){const[cx,cz]=k.split(',').map(Number);if(Math.abs(cx-pcx)>CFG.renderDist+1||Math.abs(cz-pcz)>CFG.renderDist+1)toUnload.push(k);}for(const k of toUnload){if(chunks[k]){chunks[k].unload();loadedChunks.delete(k);}}for(const{k,cx,cz}of toLoad){if(!chunks[k])chunks[k]=new Chunk(cx,cz);chunks[k].generate(CFG.seed);loadedChunks.add(k);}}

// === JUGADOR ===
const player={pos:new THREE.Vector3(0,20,0),vel:new THREE.Vector3(),yaw:0,pitch:0,onGround:false,health:CFG.maxHealth,hunger:CFG.maxHunger,xp:0,inventory:{},slot:0,smooth:{x:0,z:0}};for(const t of Object.keys(MT))player.inventory[t]=0;player.inventory.grass=20;player.inventory.wood=15;player.inventory.stone=25;player.inventory.torch=10;

// === DÍA/NOCHE ===
const timeSys={t:0,sky:new THREE.Color(0x87CEEB),amb:0.6,sun:null,moon:null,stars:null,init(){this.sun=new THREE.DirectionalLight(0xffffff,0.85);this.sun.position.set(20,50,20);this.sun.castShadow=true;this.sun.shadow.mapSize.set(1024,1024);this.sun.shadow.camera.near=1;this.sun.shadow.camera.far=80;this.sun.shadow.camera.left=-50;this.sun.shadow.camera.right=50;this.sun.shadow.camera.top=50;this.sun.shadow.camera.bottom=-50;scene.add(this.sun);this.moon=new THREE.DirectionalLight(0x8899ff,0.2);this.moon.position.set(-20,30,-20);scene.add(this.moon);this.stars=new THREE.Group();const g=new THREE.BufferGeometry(),p=[];for(let i=0;i<400;i++)p.push((Math.random()-.5)*180,Math.random()*80+30,(Math.random()-.5)*180);g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));const m=new THREE.PointsMaterial({color:0xffffff,size:0.25,transparent:true,opacity:0.7});this.stars.add(new THREE.Points(g,m));this.stars.visible=false;scene.add(this.stars);scene.add(new THREE.AmbientLight(0xffffff,this.amb));},update(dt){this.t=(this.t+dt)%CFG.dayLength;const pr=this.t/CFG.dayLength;if(pr<.25){const t=pr/.25;this.sky.setHSL(.55,.5,.6+t*.1);this.amb=.4+t*.4;}else if(pr<.5){this.sky.setHSL(.55,.5,.7);this.amb=.8;}else if(pr<.75){const t=(pr-.5)/.25;this.sky.setHSL(.08+t*.02,.7,.5+t*.2);this.amb=.8-t*.4;}else{const t=(pr-.75)/.25;this.sky.setHSL(.6,.3,.1+t*.1);this.amb=.1+t*.1;this.stars.visible=true;}const a=pr*Math.PI*2;this.sun.position.set(Math.cos(a)*60,Math.sin(a)*60,Math.sin(a*.5)*30);this.sun.intensity=Math.max(0,Math.sin(a))*.9;this.moon.position.set(Math.cos(a+Math.PI)*60,Math.sin(a+Math.PI)*30,Math.sin(a*.5+Math.PI)*30);scene.fog.color.copy(this.sky);renderer.setClearColor(this.sky);scene.children.forEach(c=>{if(c.isAmbientLight)c.intensity=this.amb;});}};timeSys.init();

// === ENTIDADES ===
class Ent{constructor(x,y,z,type){this.pos=new THREE.Vector3(x,y,z);this.vel=new THREE.Vector3();this.type=type;this.hp=type==='cow'?10:20;this.state='idle';this.timer=Math.random()*5;this.target=null;this.createMesh();}createMesh(){this.mesh=new THREE.Group();if(this.type==='cow'){const b=new THREE.Mesh(new THREE.BoxGeometry(1,.8,.6),new THREE.MeshLambertMaterial({color:0x8B4513}));b.position.y=.6;this.mesh.add(b);const h=new THREE.Mesh(new THREE.BoxGeometry(.5,.5,.5),new THREE.MeshLambertMaterial({color:0x333}));h.position.set(.5,.9,.2);this.mesh.add(h);const lg=new THREE.BoxGeometry(.15,.5,.15),lm=new THREE.MeshLambertMaterial({color:0x222});[[-.35,-.2],[.35,-.2],[-.35,.2],[.35,.2]].forEach(([x,z])=>{const l=new THREE.Mesh(lg,lm);l.position.set(x,.1,z);this.mesh.add(l);});}else if(this.type==='villager'){const r=new THREE.Mesh(new THREE.BoxGeometry(.6,1.1,.4),new THREE.MeshLambertMaterial({color:0x6B4423}));r.position.y=.55;this.mesh.add(r);const h=new THREE.Mesh(new THREE.BoxGeometry(.5,.5,.5),new THREE.MeshLambertMaterial({color:0xE8C97E}));h.position.y=1.3;this.mesh.add(h);const n=new THREE.Mesh(new THREE.BoxGeometry(.08,.15,.12),new THREE.MeshLambertMaterial({color:0xD4A66A}));n.position.set(0,1.25,.32);this.mesh.add(n);const em=new THREE.MeshLambertMaterial({color:0x2C3E50}),eg=new THREE.BoxGeometry(.08,.08,.05);[-.12,.12].forEach(x=>{const e=new THREE.Mesh(eg,em);e.position.set(x,1.32,.26);this.mesh.add(e);});const ag=new THREE.BoxGeometry(.25,.7,.25),am=new THREE.MeshLambertMaterial({color:0x6B4423});[-.38,.38].forEach(x=>{const a=new THREE.Mesh(ag,am);a.position.set(x,.45,.28);a.rotation.x=-.6;this.mesh.add(a);});}this.mesh.position.copy(this.pos);this.mesh.castShadow=true;scene.add(this.mesh);}update(dt,pp){this.timer-=dt;if(this.state==='idle'&&this.timer<=0){this.timer=3+Math.random()*4;if(Math.random()<.25){this.state='walk';this.target=new THREE.Vector3(this.pos.x+(Math.random()-.5)*7,this.pos.y,this.pos.z+(Math.random()-.5)*7);}}else if(this.state==='walk'){const d=new THREE.Vector3().subVectors(this.target,this.pos).normalize();this.pos.addScaledVector(d,1.2*dt);this.mesh.lookAt(this.target.x,this.pos.y,this.target.z);const t=Date.now()/1000,sw=Math.sin(t*7)*.2;this.mesh.children.slice(-4).forEach((l,i)=>{if(l.isMesh)l.rotation.x=sw*(i%2===0?1:-1);});const bl=getBlock(this.pos.x,this.pos.y-1.2,this.pos.z);if(!bl||bl.type==='water')this.pos.y-=9*dt;else this.pos.y=Math.floor(this.pos.y-.5)+1.1;if(this.pos.distanceTo(this.target)<.4)this.state='idle';const dist=this.pos.distanceTo(pp);if(dist<3&&this.type==='cow')this.target=this.pos.clone().sub(new THREE.Vector3().subVectors(pp,this.pos).normalize().multiplyScalar(4));}this.mesh.position.copy(this.pos);}dmg(a){this.hp-=a;if(this.hp<=0){if(this.type==='cow'){player.inventory.leather=(player.inventory.leather||0)+2;player.inventory.beef=(player.inventory.beef||0)+3;toast('¡Cuero +2, Carne +3!');SFX.play('eat');}scene.remove(this.mesh);return true;}return false;}}const ents=[];function spawnEnt(t,x,y,z){ents.push(new Ent(x,y,z,t));}

// === UTILS ===
function getBlock(x,y,z){return getChunk(x,z).getBlock(x,y,z);}function setBlock(x,y,z,type){getChunk(x,z).setBlock(x,y,z,type);if(type&&player.inventory[type]!==undefined){player.inventory[type]=Math.max(0,player.inventory[type]-1);updHotbar();}SFX.play('place');}function removeBlock(x,y,z){const b=getBlock(x,y,z);if(!b)return;getChunk(x,z).setBlock(x,y,z,null);if(b.type!=='water'&&b.type!=='bedrock'){player.inventory[b.type]=(player.inventory[b.type]||0)+1;toast(`+1 ${b.type}`);SFX.play('break');updHotbar();}}function solid(t){return t&&!['water','air','torch','cherryLeaves'].includes(t);}function chkCol(x,y,z,w){const hw=w,pts=[[x+hw,y,z],[x-hw,y,z],[x,y,z+hw],[x,y,z-hw],[x+hw,y-1,z],[x-hw,y-1,z],[x,y-1,z+hw],[x,y-1,z-hw],[x,y+.5,z]];for(const[px,py,pz]of pts)if(solid(getBlock(px,py,pz)?.type))return true;return false;}

// === CONTROLES ===
const joy=document.getElementById('joystick'),knob=document.getElementById('knob'),lookZ=document.getElementById('look-zone');let joyId=null,lookId=null,lastL=null,joyIn={x:0,z:0},jump=false,brk=false,plc=false;
document.addEventListener('touchstart',e=>{for(const t of e.changedTouches){if(joy.contains(t.target)){joyId=t.identifier;updJoy(t);}else if(lookZ.contains(t.target)){lookId=t.identifier;lastL={x:t.clientX,y:t.clientY};}else if(t.target.closest('#btn-jump'))jump=true;else if(t.target.closest('#btn-break')){brk=true;doBreak();}else if(t.target.closest('#btn-place')){plc=true;doPlace();}else if(t.target.closest('#btn-inventory'))toggleInv();else if(t.target.closest('#btn-pause'))togglePause();else if(t.target.closest('.slot'))return;else{lookId=t.identifier;lastL={x:t.clientX,y:t.clientY};}}},{passive:false});
document.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joyId)updJoy(t);else if(t.identifier===lookId&&lastL){const dx=t.clientX-lastL.x,dy=t.clientY-lastL.y;player.yaw-=dx*.004;player.pitch-=dy*.004;player.pitch=Math.max(-Math.PI/2+.1,Math.min(Math.PI/2-.1,player.pitch));lastL={x:t.clientX,y:t.clientY};}}},{passive:false});
document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===joyId){joyId=null;joyIn={x:0,z:0};knob.style.transform='translate(-50%,-50%)';}if(t.identifier===lookId){lookId=null;lastL=null;}}jump=false;brk=false;plc=false;});
function updJoy(t){const r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,m=r.width/2;let dx=(t.clientX-cx)/m,dz=(t.clientY-cy)/m,l=Math.hypot(dx,dz);if(l>1){dx/=l;dz/=l;}joyIn.x=dx;joyIn.z=dz;const of=l*24,a=Math.atan2(dz,dx);knob.style.transform=`translate(${Math.cos(a)*of-22}px,${Math.sin(a)*of-22}px)`;}

// === FÍSICA ===
function updPlayer(dt){camera.rotation.set(0,0,0);camera.rotateY(player.yaw);camera.rotateX(player.pitch);const fwd=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),player.yaw),rt=new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0),player.yaw);player.smooth.x+=(joyIn.x-player.smooth.x)*9*dt;player.smooth.z+=(joyIn.z-player.smooth.z)*9*dt;const mv=new THREE.Vector3().addScaledVector(fwd,-player.smooth.z).addScaledVector(rt,player.smooth.x);if(mv.length()>.1)mv.normalize().multiplyScalar(CFG.speed);const nx=player.pos.x+mv.x*dt;if(!chkCol(nx,player.pos.y,player.pos.z,.3))player.pos.x=nx;const nz=player.pos.z+mv.z*dt;if(!chkCol(player.pos.x,player.pos.y,nz,.3))player.pos.z=nz;player.vel.y-=CFG.gravity*dt;if(jump&&player.onGround){player.vel.y=CFG.jumpForce;player.onGround=false;SFX.play('jump');}const ny=player.pos.y+player.vel.y*dt;if(player.vel.y<0){if(solid(getBlock(player.pos.x,ny-player.height,player.pos.z)?.type)){player.pos.y=Math.floor(ny-player.height)+1+player.height-.5;player.vel.y=0;player.onGround=true;}else{player.pos.y=ny;player.onGround=false;}}else{if(solid(getBlock(player.pos.x,ny+.2,player.pos.z)?.type))player.vel.y=0;else player.pos.y=ny;}if(player.pos.y<-15){player.health=Math.max(1,player.health-3);updHUD();player.pos.set(0,20,0);player.vel.set(0,0,0);toast('¡Caída! -3 ❤️');SFX.play('hurt');}if(Math.abs(player.smooth.x)+Math.abs(player.smooth.z)>.25){player.hunger-=dt*.008;if(player.hunger<0){player.hunger=0;player.health=Math.max(1,player.health-dt*.4);updHUD();}}const wb=(Math.abs(player.smooth.x)+Math.abs(player.smooth.z)>.25)?Math.sin(Date.now()*.01)*.03:0;camera.position.set(player.pos.x,player.pos.y+wb,player.pos.z);loadChunks(player.pos.x,player.pos.z);}

// === INTERACCIÓN ===
const ray=new THREE.Raycaster(),rc=new THREE.Vector2(0,0);function getHit(){ray.setFromCamera(rc,camera);const all=[];for(const c of Object.values(chunks))for(const k in c.blocks){const b=c.blocks[k];if(b.mesh)all.push(b.mesh);}const h=ray.intersectObjects(all,false);if(h.length>0&&h[0].distance<5)return{pos:h[0].object.position.clone(),n:h[0].face.normal.clone(),b:h[0].object.userData};return null;}function doBreak(){const h=getHit();if(h)removeBlock(h.pos.x,h.pos.y,h.pos.z);}function doPlace(){const h=getHit();if(!h)return;const p=h.pos.clone().add(h.n.multiplyScalar(.5)),x=Math.round(p.x),y=Math.round(p.y),z=Math.round(p.z);if(Math.abs(x-player.pos.x)<.75&&Math.abs(z-player.pos.z)<.75&&y>player.pos.y-1&&y<player.pos.y+1)return;const slots=['grass','dirt','stone','cobble','wood','planks','sand','snow','wool','glass','torch'],t=slots[player.slot]||'grass';if((player.inventory[t]||0)<=0){toast('¡Sin bloques!');return;}setBlock(x,y,z,t);}

// === UI ===
const hotbar=document.getElementById('hotbar'),hSlots=['grass','dirt','stone','cobble','wood','planks','sand','snow','wool','glass'];function updHotbar(){hotbar.innerHTML='';hSlots.forEach((t,i)=>{const s=document.createElement('div');s.className='slot'+(i===player.slot?' active':'');const c=document.createElement('canvas');c.width=16;c.height=16;const x=c.getContext('2d');const tx=TX[t]||TX.dirt;if(tx?.image)x.drawImage(tx.image,0,0,16,16);s.appendChild(c);const ct=player.inventory[t]||0;if(ct>1){const n=document.createElement('div');n.className='slot-count';n.textContent=ct;s.appendChild(n);}s.onclick=()=>{player.slot=i;updHotbar();};hotbar.appendChild(s);});}
function updHUD(){const hb=document.getElementById('health-bar');hb.innerHTML='';for(let i=0;i<10;i++){const h=document.createElement('div');h.className='heart'+(player.health>i*2?'':player.health>i*2-1?' half':'');hb.appendChild(h);}const nb=document.getElementById('hunger-bar');nb.innerHTML='';for(let i=0;i<10;i++){const d=document.createElement('div');d.className='drumstick'+(player.hunger>i*2?'':'');nb.appendChild(d);}const xb=document.getElementById('xp-bar');xb.innerHTML='';const o=document.createElement('div');o.className='xp-orb';xb.appendChild(o);const xt=document.createElement('span');xt.style.cssText='color:#fff;font-size:11px;margin-left:3px';xt.textContent=player.xp;xb.appendChild(xt);}

// === INVENTARIO ===
function toggleInv(){document.getElementById('inventory-screen').classList.toggle('active');if(document.getElementById('inventory-screen').classList.contains('active'))renderInv();}function renderInv(){const g=document.getElementById('inventory-grid');g.innerHTML='';const types=Object.keys(MT).filter(t=>!t.includes('ore')&&t!=='torch');types.forEach(t=>{const s=document.createElement('div');s.className='inv-slot';const c=document.createElement('canvas');c.width=16;c.height=16;const x=c.getContext('2d');if(TX[t]?.image)x.drawImage(TX[t].image,0,0,16,16);s.appendChild(c);const ct=player.inventory[t]||0;if(ct>0){const n=document.createElement('div');n.className='inv-count';n.textContent=ct;s.appendChild(n);}s.onclick=()=>{document.querySelectorAll('.inv-slot').forEach(sl=>sl.classList.remove('active'));s.classList.add('active');updCraft(t);};g.appendChild(s);});}function updCraft(t){const r=document.getElementById('craft-result');r.innerHTML='';const c=document.createElement('canvas');c.width=16;c.height=16;const x=c.getContext('2d');const tx=TX[t==='wood'?'planks':t]||TX.planks;if(tx?.image)x.drawImage(tx.image,0,0,16,16);r.appendChild(c);const b=document.getElementById('craft-btn');b.disabled=(player.inventory[t]||0)<4;b.onclick=()=>{if((player.inventory[t]||0)>=4){player.inventory[t]-=4;const cr=t==='wood'?'planks':t+'_craft';player.inventory[cr]=(player.inventory[cr]||0)+4;toast('¡Crafteado! +4');SFX.play('craft');updHotbar();renderInv();}};}

// === TOAST ===
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';t.style.animation='none';setTimeout(()=>{t.style.animation='toastSlide 0.3s ease'},10);setTimeout(()=>{t.style.display='none'},2200);}

// === GUARDAR ===
function save(){localStorage.setItem(CFG.saveKey,JSON.stringify({player:{pos:player.pos.toArray(),yaw:player.yaw,pitch:player.pitch,health:player.health,hunger:player.hunger,xp:player.xp,inventory:player.inventory},seed:CFG.seed,ts:Date.now()}));toast('¡Guardado!');}function load(){const s=localStorage.getItem(CFG.saveKey);if(!s)return false;try{const d=JSON.parse(s);player.pos.fromArray(d.player.pos);player.yaw=d.player.yaw;player.pitch=d.player.pitch;player.health=d.player.health;player.hunger=d.player.hunger;player.xp=d.player.xp;player.inventory=d.player.inventory;CFG.seed=d.seed;updHUD();updHotbar();toast('¡Cargado!');return true;}catch(e){return false;}}

// === PÉTALOS ===
function spawnPetal(){const p=document.createElement('div');p.className='petal';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*6)+'s';p.style.animationDelay=Math.random()*2+'s';document.getElementById('petals').appendChild(p);setTimeout(()=>p.remove(),15000);}function startPetals(){for(let i=0;i<20;i++)setTimeout(spawnPetal,i*250);setInterval(spawnPetal,1800);}startPetals();

// === LOOP ===
const clock=new THREE.Clock();let gameRun=true;function anim(){requestAnimationFrame(anim);const dt=Math.min(clock.getDelta(),.05);if(gameRun){updPlayer(dt);timeSys.update(dt);for(const e of ents)e.update(dt,player.pos);if(brk)doBreak();if(plc)doPlace();}renderer.render(scene,camera);}

// === PAUSA ===
function togglePause(){gameRun=!gameRun;document.getElementById('pause-menu').classList.toggle('active',!gameRun);}document.getElementById('resume-btn').onclick=()=>{gameRun=true;document.getElementById('pause-menu').classList.remove('active');};document.getElementById('save-btn').onclick=()=>{save();};document.getElementById('exit-btn').onclick=()=>{window.location.href='loading.html';};

// === INICIAR ===
load();updHUD();updHotbar();for(let i=0;i<6;i++)spawnEnt('cow',Math.random()*25-12,10,Math.random()*25-12);for(let i=0;i<2;i++)spawnEnt('villager',Math.random()*15-7,10,Math.random()*15-7);for(let y=18;y>0;y--)if(solid(getBlock(0,y,0)?.type)){player.pos.set(.5,y+1.7,.5);break;}anim();console.log('🌍 AdrianCraft World Loaded');
</script>

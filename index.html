<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AdrianCraft - Juego</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:system-ui,-apple-system,sans-serif}
canvas{display:block;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#coords{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;font-family:monospace;letter-spacing:1px}
#time{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:6px}
#mode{position:absolute;top:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.7);padding:4px 10px;border-radius:6px;font-size:10px;letter-spacing:1px}
#inv{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);padding:6px;border-radius:10px;border:1px solid rgba(255,255,255,0.1)}
.slot{width:44px;height:44px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;pointer-events:auto;position:relative}
.slot.sel{border-color:#5a8f3c;background:rgba(90,143,60,0.25);box-shadow:0 0 10px rgba(90,143,60,0.4)}
.slot canvas{width:32px;height:32px;image-rendering:pixelated}
.cnt{position:absolute;bottom:2px;right:4px;color:#fff;font-size:9px;font-weight:700;text-shadow:0 1px 2px #000}
#ctrls{position:absolute;inset:0;pointer-events:auto;display:flex}
#joy{position:absolute;bottom:80px;left:20px;width:120px;height:120px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);border-radius:50%;touch-action:none}
#joy-k{position:absolute;width:40px;height:40px;background:rgba(255,255,255,0.3);border:2px solid rgba(255,255,255,0.5);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#look{position:absolute;top:0;right:0;width:50%;height:70%;touch-action:none}
#acts{position:absolute;bottom:80px;right:20px;display:flex;gap:12px;pointer-events:auto}
.act{width:52px;height:52px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center}
.act svg{width:22px;height:22px;fill:rgba(255,255,255,0.9)}
#back{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.1);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;pointer-events:auto;display:flex;align-items:center;gap:6px}
#back svg{width:14px;height:14px;fill:currentColor}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="coords">X: 0 Y: 0 Z: 0</div>
<div id="time"><span id="tIcon"></span><span id="tTxt">Dia</span></div>
<div id="mode">MODO: CONSTRUIR</div>
<div id="inv"></div>
<div id="ctrls">
<div id="joy"><div id="joy-k"></div></div>
<div id="look"></div>
<div id="acts">
<div class="act" id="brk"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>
<div class="act" id="plc"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
<div class="act" id="jmp"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></div>
</div>
</div>
<button id="back" onclick="location.href='lobby.html'"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>Lobby</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== CONFIG ====================
const WORLD=300, BLOCK=1, GRAV=22, JUMP=8, SPD=5, SENS=0.002;
const TYPES={0:null,1:{n:'Pasto',c:0x5a8f3c},2:{n:'Tierra',c:0x8B6914},3:{n:'Piedra',c:0x808080},4:{n:'Madera',c:0x6B4226},5:{n:'Hojas',c:0x3d6b24},6:{n:'Agua',c:0x3d7ab5,trans:true},7:{n:'Arena',c:0xe8d68e},8:{n:'Tablon',c:0xc49a5a},9:{n:'Adoquin',c:0x6b6b6b},10:{n:'Vidrio',c:0xadd8e6,trans:true},11:{n:'Lana',c:0xf0f0f0}};

// ==================== STATE ====================
let scene,cam,rend,raycaster,light,sun;
let blocks=new Map(), ents=[];
let inv=[{id:1,n:64},{id:2,n:64},{id:3,n:64},{id:4,n:32},{id:8,n:32},{id:5,n:16},{id:11,n:16}];
let sel=0, gameTime=0;
let pl={x:150,y:30,z:150,vy:0,onG:false,yaw:0,pitch:0};
let joy={x:0,y:0}, look={x:0,y:0};
let keys={w:false,a:false,s:false,d:false};

// ==================== INIT ====================
function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87CEEB);
  scene.fog=new THREE.Fog(0x87CEEB,20,100);

  cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,150);
  cam.position.set(pl.x,pl.y+1.6,pl.z);

  rend=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:false,powerPreference:'high-performance'});
  rend.setSize(innerWidth,innerHeight);
  rend.setPixelRatio(Math.min(devicePixelRatio,2));

  raycaster=new THREE.Raycaster();
  raycaster.far=6;

  light=new THREE.HemisphereLight(0xffffff,0x444444,0.6);
  scene.add(light);
  sun=new THREE.DirectionalLight(0xffffff,0.8);
  sun.position.set(50,100,50);
  scene.add(sun);

  genWorld();
  buildInv();
  setupControls();
  loop();
}

// ==================== WORLD GEN ====================
function noise(x,z){return Math.sin(x*12.9+z*78.2)*0.5+0.5}
function h(x,z){return Math.floor(25+noise(x,z)*12+noise(x*2.1,z*2.1)*5+noise(x*0.05,z*0.05)*15)}

function genWorld(){
  const g=new THREE.BoxGeometry(BLOCK,BLOCK,BLOCK);
  const mats={};
  for(let id in TYPES){if(!id)continue; mats[id]=new THREE.MeshLambertMaterial({color:TYPES[id].c,transparent:!!TYPES[id].trans,opacity:TYPES[id].trans?0.6:1})}

  for(let x=0;x<WORLD;x++){
    for(let z=0;z<WORLD;z++){
      const sy=h(x,z);
      for(let y=0;y<sy;y++){
        let id=y===sy-1?1:(y>sy-4?2:3);
        if(id===6||id===10)continue;
        if(Math.random()<0.02&&y>sy-10)id=Math.random()<0.5?15:3;
        setBlock(x,y,z,id);
      }
      if(sy<28){for(let y=sy;y<28;y++)setBlock(x,y,z,6)}
    }
  }

  // Trees
  for(let x=5;x<WORLD-5;x+=3+Math.floor(Math.random()*4)){
    for(let z=5;z<WORLD-5;z+=3+Math.floor(Math.random()*4)){
      if(Math.random()>0.3)continue;
      const sy=h(x,z);
      if(sy<28)continue;
      const th=4+Math.floor(Math.random()*3);
      for(let y=1;y<=th;y++)setBlock(x,sy+y,z,4);
      for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++)for(let dy=th-1;dy<=th+1;dy++){
        if(Math.abs(dx)+Math.abs(dz)+Math.abs(dy-th)<4)
        if(dx||dz||dy>th) setBlock(x+dx,sy+dy,z+dz,5);
      }
    }
  }

  // Entities
  for(let i=0;i<20;i++){
    const ex=20+Math.random()*260, ez=20+Math.random()*260;
    const ey=h(Math.floor(ex),Math.floor(ez))+1.5;
    ents.push({mesh:null,type:['cow','sheep','wolf'][i%3],x:ex,y:ey,z:ez,vx:0,vz:0,dir:Math.random()*Math.PI*2,t:0});
  }
}

function setBlock(x,y,z,id){
  if(x<0||x>=WORLD||z<0||z>=WORLD||y<0)return;
  const k=`${x},${y},${z}`;
  if(id===0){if(blocks.has(k)){scene.remove(blocks.get(k));blocks.delete(k)}}
  else{
    if(blocks.has(k))scene.remove(blocks.get(k));
    const m=new THREE.Mesh(new THREE.BoxGeometry(BLOCK,BLOCK,BLOCK),new THREE.MeshLambertMaterial({color:TYPES[id].c,transparent:!!TYPES[id].trans,opacity:TYPES[id].trans?0.6:1}));
    m.position.set(x+0.5,y+0.5,z+0.5);
    scene.add(m);
    blocks.set(k,{mesh:m,x,y,z,id});
  }
}

// ==================== CONTROLS ====================
function setupControls(){
  const joyEl=document.getElementById('joy'), joyK=document.getElementById('joy-k');
  let joyTouch=null;
  joyEl.ontouchstart=e=>{e.preventDefault();joyTouch=e.changedTouches[0].identifier;};
  window.ontouchmove=e=>{
    for(let t of e.changedTouches){
      if(t.identifier===joyTouch){
        const r=joyEl.getBoundingClientRect();
        let dx=t.clientX-r.left-60, dy=t.clientY-r.top-60;
        const d=Math.min(60,Math.hypot(dx,dy));
        const a=Math.atan2(dy,dx);
        dx=Math.cos(a)*d; dy=Math.sin(a)*d;
        joy.x=dx/60; joy.y=dy/60;
        joyK.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }
    }
  };
  window.ontouchend=e=>{for(let t of e.changedTouches)if(t.identifier===joyTouch){joy.x=0;joy.y=0;joyK.style.transform='translate(-50%,-50%)';joyTouch=null;}};

  const lookEl=document.getElementById('look');
  let lookTouch=null, lx=0, ly=0;
  lookEl.ontouchstart=e=>{e.preventDefault();lookTouch=e.changedTouches[0].identifier;lx=e.touches[0].clientX;ly=e.touches[0].clientY;};
  window.ontouchmove=e=>{
    for(let t of e.changedTouches)if(t.identifier===lookTouch){
      pl.yaw-=(t.clientX-lx)*SENS;
      pl.pitch-=(t.clientY-ly)*SENS;
      pl.pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,pl.pitch));
      lx=t.clientX; ly=t.clientY;
    }
  };
  window.ontouchend=e=>{for(let t of e.changedTouches)if(t.identifier===lookTouch)lookTouch=null;};

  document.getElementById('brk').onclick=()=>breakBlock();
  document.getElementById('plc').onclick=()=>placeBlock();
  document.getElementById('jmp').onclick=()=>{if(pl.onG){pl.vy=JUMP;pl.onG=false;}};
}

function getTarget(){
  const dir=new THREE.Vector3();
  cam.getWorldDirection(dir);
  raycaster.set(cam.position,dir);
  const hits=[];
  blocks.forEach(b=>{if(b.mesh)hits.push(b.mesh)});
  const res=raycaster.intersectObjects(hits);
  return res.length?res[0]:null;
}

function breakBlock(){
  const hit=getTarget();if(!hit)return;
  const p=hit.object.position;
  const k=`${Math.floor(p.x)},${Math.floor(p.y)},${Math.floor(p.z)}`;
  if(!blocks.has(k))return;
  const b=blocks.get(k);
  const id=b.id===1?2:b.id;
  addToInv(id);
  scene.remove(b.mesh);
  blocks.delete(k);
}

function placeBlock(){
  const hit=getTarget();if(!hit)return;
  const n=hit.face.normal;
  const p=hit.object.position;
  const nx=Math.floor(p.x+n.x), ny=Math.floor(p.y+n.y), nz=Math.floor(p.z+n.z);
  if(nx<0||nx>=WORLD||nz<0||nz>=WORLD||ny<0||ny>80)return;
  if(pl.x-0.5<nx&&pl.x+0.5>nx&&pl.z-0.5<nz&&pl.z+0.5>nz&&pl.y>ny&&pl.y-1.8<ny+1)return;
  const id=inv[sel]?.id;
  if(!id)return;
  addToInv(id,-1);
  setBlock(nx,ny,nz,id);
}

function addToInv(id,amt=1){
  let s=inv.find(i=>i.id===id);
  if(s)s.n=Math.max(0,Math.min(64,s.n+amt));
  else if(amt>0&&inv.length<9)inv.push({id,n:amt});
  inv=inv.filter(i=>i.n>0);
  buildInv();
}

function buildInv(){
  const bar=document.getElementById('inv');bar.innerHTML='';
  for(let i=0;i<9;i++){
    const d=document.createElement('div');d.className='slot'+(i===sel?' sel':'');
    if(inv[i]){
      const c=document.createElement('canvas');c.width=32;c.height=32;
      const ctx=c.getContext('2d');ctx.fillStyle='#'+TYPES[inv[i].id].c.toString(16).padStart(6,'0');
      ctx.fillRect(4,4,24,24);ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.strokeRect(4,4,24,24);
      d.appendChild(c);
      const cn=document.createElement('span');cn.className='cnt';cn.textContent=inv[i].n;d.appendChild(cn);
    }
    d.onclick=()=>{sel=i;buildInv()};bar.appendChild(d);
  }
}

// ==================== PHYSICS & LOOP ====================
function isSolid(x,y,z){
  const k=`${x},${y},${z}`;
  return blocks.has(k)&&!TYPES[blocks.get(k).id].trans;
}

function update(dt){
  gameTime+=dt;
  const t=gameTime%600;
  let sky=0x87CEEB,l=1;
  if(t<100){l=0.3+t/100*0.7;sky=0x111122}
  else if(t<400){l=1;sky=0x87CEEB}
  else if(t<480){l=1-(t-400)/80*0.7;sky=0x111122}
  else{l=0.3;sky=0x111122}
  scene.background.setHex(sky);scene.fog.color.setHex(sky);sun.intensity=l;

  cam.position.set(pl.x,pl.y+1.6,pl.z);
  cam.rotation.order='YXZ';cam.rotation.y=pl.yaw;cam.rotation.x=pl.pitch;

  const fx=Math.sin(pl.yaw), fz=Math.cos(pl.yaw);
  const rx=Math.cos(pl.yaw), rz=-Math.sin(pl.yaw);
  let mx=0,mz=0;
  if(keys.w||joy.y< -0.2){mx+=fx*-joy.y;mz+=fz*-joy.y}
  if(keys.s||joy.y>0.2){mx+=fx*joy.y;mz+=fz*joy.y}
  if(keys.a||joy.x< -0.2){mx+=rx*joy.x;mz+=rz*joy.x}
  if(keys.d||joy.x>0.2){mx+=rx*-joy.x;mz+=rz*-joy.x}
  const len=Math.hypot(mx,mz);if(len>0){mx/=len;mz/=len}

  pl.x+=mx*SPD*dt;
  if(checkCol(pl.x,pl.y,pl.z)){pl.x-=mx*SPD*dt}
  pl.z+=mz*SPD*dt;
  if(checkCol(pl.x,pl.y,pl.z)){pl.z-=mz*SPD*dt}

  pl.vy-=GRAV*dt;
  pl.y+=pl.vy*dt;
  pl.onG=false;
  if(checkCol(pl.x,pl.y,pl.z)){
    pl.y-=pl.vy*dt;
    if(pl.vy<0)pl.onG=true;
    pl.vy=0;
  }

  document.getElementById('coords').textContent=`X:${Math.floor(pl.x)} Y:${Math.floor(pl.y)} Z:${Math.floor(pl.z)}`;
  document.getElementById('tTxt').textContent=t<100?'Amanecer':t<400?'Dia':t<480?'Atardecer':'Noche';
}

function checkCol(x,y,z){
  const r=0.3;
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)for(let dz=-1;dz<=1;dz++){
    const bx=Math.floor(x+dx),by=Math.floor(y+dy),bz=Math.floor(z+dz);
    if(isSolid(bx,by,bz)){
      if(x+r>bx&&x-r<bx+1&&z+r>bz&&z-r<bz+1&&y+1.8>by&&y<by+1)return true;
    }
  }return false;
}

function loop(t){
  requestAnimationFrame(loop);
  update((t||performance.now())/1000);
  rend.render(scene,cam);
}

window.onload=init;
</script>
</body>
</html>
